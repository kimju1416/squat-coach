<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#02060f">
<title>AI 스쿼트 코치 — 자세 인식 트레이너</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#02060f;overflow:hidden;font-family:'Pretendard',sans-serif;color:#e8faff;}
  #stage{position:fixed;inset:0;background:#000;}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);
    filter:brightness(0.42) contrast(1.06) saturate(0.75);}   /* 카메라 화면 약간 어둡게 */
  video.rear{transform:none;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  canvas.rear{transform:none !important;}
  #vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at center,transparent 48%,rgba(2,6,23,0.5) 100%);}
  #scan{position:absolute;left:0;right:0;height:2px;z-index:3;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(34,211,238,0.6),transparent);
    box-shadow:0 0 14px 2px rgba(34,211,238,0.45);animation:scan 3.8s linear infinite;}
  @keyframes scan{0%{top:8%;}50%{top:88%;}100%{top:8%;}}
  /* 코너 브래킷 */
  .corner{position:absolute;width:36px;height:36px;border:2px solid rgba(34,211,238,.55);z-index:4;pointer-events:none;filter:drop-shadow(0 0 6px rgba(34,211,238,.6));}
  .c-tl{top:12px;left:12px;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
  .c-tr{top:12px;right:12px;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
  .c-bl{bottom:12px;left:12px;border-right:none;border-top:none;border-radius:0 0 0 8px;}
  .c-br{bottom:12px;right:12px;border-left:none;border-top:none;border-radius:0 0 8px 0;}
  /* HUD 상단 */
  #hudTop{position:absolute;top:0;left:0;right:0;padding:16px 18px;display:flex;justify-content:space-between;align-items:flex-start;z-index:6;}
  .hud-title{font-size:13px;font-weight:800;letter-spacing:3px;color:#22d3ee;text-shadow:0 0 12px rgba(34,211,238,.8);white-space:nowrap;}
  .hud-sub{font-size:10.5px;color:#7dd3fc;opacity:.75;margin-top:3px;letter-spacing:1px;white-space:nowrap;}
  .hud-btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
  /* 버튼 글자 가로 고정: nowrap + inline-flex + 최소폭, 글자 단위 줄바꿈 금지 */
  .hbtn{display:none;align-items:center;justify-content:center;writing-mode:horizontal-tb;
    background:rgba(8,20,40,.65);border:1px solid rgba(34,211,238,.4);color:#a5f3fc;border-radius:10px;
    padding:0 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;backdrop-filter:blur(6px);
    min-height:42px;min-width:56px;white-space:nowrap;word-break:keep-all;flex:0 0 auto;line-height:1;}
  .hbtn.show{display:inline-flex;}
  /* 카운터 */
  #counterBox{position:absolute;top:66px;left:18px;z-index:6;display:none;}
  #repNum{font-size:min(24vw,96px);font-weight:900;line-height:.95;letter-spacing:-4px;color:#fff;
    text-shadow:0 0 24px rgba(34,211,238,.9),0 0 60px rgba(34,211,238,.5);font-variant-numeric:tabular-nums;}
  #repNum.pop{animation:pop .35s cubic-bezier(.2,1.6,.4,1);}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.18);}100%{transform:scale(1);}}
  #repLbl{font-size:12px;font-weight:800;letter-spacing:4px;color:#7dd3fc;margin-top:2px;}
  /* 상태·게이지 */
  #stateTxt{position:absolute;left:0;right:0;bottom:118px;text-align:center;font-size:min(6.4vw,26px);font-weight:900;letter-spacing:-.5px;z-index:6;
    color:#22d3ee;text-shadow:0 0 18px rgba(34,211,238,.8);transition:color .15s;padding:0 20px;word-break:keep-all;}
  #depthWrap{position:absolute;left:50%;transform:translateX(-50%);bottom:86px;width:min(72vw,320px);height:10px;border-radius:99px;background:rgba(148,163,184,.22);overflow:hidden;z-index:6;border:1px solid rgba(34,211,238,.3);display:none;}
  #depthBar{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#22d3ee,#a3e635);box-shadow:0 0 14px rgba(163,230,53,.7);transition:width .08s linear;}
  #depthLbl{position:absolute;left:0;right:0;bottom:64px;text-align:center;font-size:11px;font-weight:700;color:#94c9dd;letter-spacing:3px;z-index:6;display:none;}
  #privacy{position:absolute;bottom:36px;left:0;right:0;text-align:center;font-size:10.5px;color:#4e6a8a;z-index:6;}
  /* 시작 오버레이 */
  #startOverlay{position:absolute;inset:0;z-index:20;background:
    radial-gradient(700px 420px at 50% 28%, rgba(34,211,238,.13), transparent 65%), rgba(2,6,15,.95);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  #startOverlay h1{font-size:clamp(27px,7.4vw,42px);font-weight:900;letter-spacing:-1px;
    background:linear-gradient(110deg,#7fefff,#c79bff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #startOverlay p{font-size:clamp(13.5px,3.7vw,16.5px);color:#9fb6d8;line-height:1.7;margin:16px 0 26px;max-width:430px;word-break:keep-all;}
  #startOverlay p b{color:#a5f3fc;}
  #startBtn{background:linear-gradient(135deg,#0891b2,#7c3aed);color:#fff;border:none;border-radius:16px;padding:18px 46px;
    font-size:19px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 0 34px rgba(34,211,238,.45);min-height:56px;white-space:nowrap;}
  #startBtn:disabled{opacity:.6;}
  #loadMsg{margin-top:16px;font-size:12.5px;color:#5f7ea0;min-height:1.2em;max-width:420px;line-height:1.5;}
  .guide{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap;justify-content:center;}
  .g-item{background:rgba(255,255,255,.05);border:1px solid rgba(34,211,238,.25);border-radius:12px;padding:10px 14px;font-size:12px;color:#a5f3fc;font-weight:600;white-space:nowrap;}
  /* 종료 결과 화면 — 심플하게 총 개수만 */
  #finishOverlay{position:absolute;inset:0;z-index:25;background:
    radial-gradient(700px 420px at 50% 30%, rgba(163,230,53,.13), transparent 65%), rgba(2,6,15,.96);
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  #finishNum{font-size:min(30vw,120px);font-weight:900;line-height:1;letter-spacing:-4px;color:#fff;
    text-shadow:0 0 30px rgba(163,230,53,.8),0 0 70px rgba(163,230,53,.4);}
  #finishSub{font-size:clamp(15px,4vw,19px);font-weight:800;color:#a5f3fc;letter-spacing:2px;margin-top:6px;}
  .finish-btns{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap;justify-content:center;}
  #closeBtn{background:linear-gradient(135deg,#0891b2,#7c3aed);color:#fff;border:none;border-radius:16px;
    padding:16px 44px;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 0 30px rgba(34,211,238,.4);min-height:52px;white-space:nowrap;}
  #againBtn{background:transparent;color:#a5f3fc;border:1.5px solid rgba(34,211,238,.5);border-radius:16px;
    padding:16px 34px;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;min-height:52px;white-space:nowrap;}
  #closeHint{margin-top:14px;font-size:12px;color:#5f7ea0;max-width:320px;line-height:1.5;}
</style>
</head>
<body>
<div id="stage">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>
  <div id="vignette"></div>
  <div id="scan"></div>

  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <div id="hudTop">
    <div>
      <div class="hud-title">AI SQUAT COACH</div>
      <div class="hud-sub">POSE TRACKING · ON-DEVICE</div>
    </div>
    <div class="hud-btns">
      <button class="hbtn" id="flipBtn">화면 전환</button>
      <button class="hbtn" id="resetBtn">0으로</button>
      <button class="hbtn" id="endBtn" style="border-color:rgba(251,113,133,.5);color:#fda4af;">종료</button>
      <button class="hbtn show" id="exitBtn" style="border-color:rgba(251,113,133,.5);color:#fda4af;font-size:16px;">✕</button>
    </div>
  </div>

  <div id="counterBox">
    <div id="repNum">0</div>
    <div id="repLbl">SQUATS</div>
  </div>

  <div id="stateTxt"></div>
  <div id="depthWrap"><div id="depthBar"></div></div>
  <div id="depthLbl">DEPTH</div>
  <div id="privacy">영상은 저장·전송되지 않고 기기 안에서만 처리돼요</div>

  <div id="startOverlay">
    <h1>AI 스쿼트 코치</h1>
    <p>카메라가 몸의 관절을 인식해서 스쿼트를 자동으로 세어줘요.<br>
    <b>폰을 세워두고 2~3걸음 뒤로</b> 물러나 전신이 화면에 나오게 해 주세요.<br>
    발목이 살짝 가려져도 괜찮아요.</p>
    <button id="startBtn">카메라 시작</button>
    <div id="loadMsg"></div>
    <div class="guide">
      <div class="g-item">몸 전체가 보이게 서기</div>
      <div class="g-item">깊이 앉았다 일어나면 1회</div>
      <div class="g-item">영상은 기기 밖으로 안 나가요</div>
    </div>
  </div>

  <div id="finishOverlay">
    <div id="finishNum">0</div>
    <div id="finishSub">개 완료했어요</div>
    <div class="finish-btns">
      <button id="againBtn">다시 하기</button>
      <button id="closeBtn">닫기</button>
    </div>
    <div id="closeHint"></div>
  </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

const $=id=>document.getElementById(id);
const video=$('cam'), canvas=$('cv'), ctx=canvas.getContext('2d');
let pose=null, running=false, sessionActive=false, facing='user';
let reps=0, phase='up', lastVideoTime=-1, smoothLms=null;
let kneeEMA=null, lastRepAt=0, wentDeep=false, lostFrames=0;
let audioCtx=null, wakeLock=null;

// 카운트 기준: 무릎각이 DOWN_A 아래로 내려갔다가 UP_A 위로 올라오면 1회
const DOWN_A=112, UP_A=150;

function resetSquatState(){ phase='up'; kneeEMA=null; wentDeep=false; smoothLms=null; }

// 랜드마크 위치 EMA 스무딩 — 프레임마다 튀는 관절 떨림 완화
function smoothLandmarks(lms){
  if(!smoothLms || smoothLms.length!==lms.length){
    smoothLms=lms.map(function(l){return {x:l.x,y:l.y,z:l.z,visibility:l.visibility};});
    return smoothLms;
  }
  const a=0.45;
  for(let i=0;i<lms.length;i++){
    smoothLms[i].x = smoothLms[i].x*(1-a) + lms[i].x*a;
    smoothLms[i].y = smoothLms[i].y*(1-a) + lms[i].y*a;
    smoothLms[i].z = (smoothLms[i].z||0)*(1-a) + (lms[i].z||0)*a;
    smoothLms[i].visibility = lms[i].visibility;
  }
  return smoothLms;
}

function angle(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y;
  const m=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  if(!m) return 180;
  return Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI;
}
function visOf(l){ return (l && l.visibility!=null) ? l.visibility : 1; }

function beep(f,d){
  try{
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
    const t=audioCtx.currentTime;
    g.gain.setValueAtTime(0.001,t);
    g.gain.exponentialRampToValueAtTime(0.25,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+d);
    o.start(t); o.stop(t+d);
  }catch(e){}
}
function buzz(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
async function keepAwake(){
  try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
}
function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }

async function loadModels(){
  $('loadMsg').textContent='AI 모델을 불러오는 중… (첫 실행은 10초쯤 걸려요)';
  const files=await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  // 원거리 전신 인식: full 모델 + 낮은 감지 임계값
  pose=await PoseLandmarker.createFromOptions(files,{
    baseOptions:{
      modelAssetPath:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task',
      delegate:'GPU'
    },
    runningMode:'VIDEO', numPoses:1,
    minPoseDetectionConfidence:0.3, minPosePresenceConfidence:0.3, minTrackingConfidence:0.3
  });
}

async function startCam(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:facing, width:{ideal:1280}, height:{ideal:720} }, audio:false
  });
  video.srcObject=stream;
  const rear=(facing==='environment');
  video.classList.toggle('rear', rear);
  canvas.classList.toggle('rear', rear);
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
  canvas.style.transform=rear?'none':'scaleX(-1)';
}
function stopCam(){
  const s=video.srcObject;
  if(s) s.getTracks().forEach(t=>t.stop());
  video.srcObject=null;
}

const BONES=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[27,31],[28,32]];
function P(l){ return {x:l.x*canvas.width, y:l.y*canvas.height}; }

function drawPose(lms, depth){
  const col = depth>0.8 ? '#a3e635' : '#22d3ee';
  ctx.lineWidth=Math.max(3, canvas.width/320);
  ctx.shadowBlur=18; ctx.shadowColor=col; ctx.strokeStyle=col;
  BONES.forEach(([a,b])=>{
    if(visOf(lms[a])<0.2||visOf(lms[b])<0.2) return;
    const A=P(lms[a]), B=P(lms[b]);
    ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
  });
  ctx.shadowBlur=14;
  [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i=>{
    if(visOf(lms[i])<0.2) return;
    const p=P(lms[i]);
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(4,canvas.width/180),0,Math.PI*2);
    ctx.fillStyle='#e0faff'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(7,canvas.width/110),0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  });
  // 무릎 각도 아크 + 도수
  [[23,25,27],[24,26,28]].forEach(([h,k,a])=>{
    if(visOf(lms[h])<0.3||visOf(lms[k])<0.3||visOf(lms[a])<0.2) return;
    const K=P(lms[k]);
    const ang=angle(lms[h],lms[k],lms[a]);
    ctx.shadowBlur=10; ctx.shadowColor='#fbbf24';
    ctx.beginPath();
    ctx.arc(K.x,K.y,Math.max(18,canvas.width/40),-Math.PI/2,-Math.PI/2+Math.PI*2*(1-Math.min(ang,180)/180));
    ctx.strokeStyle='#fbbf24'; ctx.lineWidth=3; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.save();
    // 텍스트는 미러 해제하고 그리기 (좌우반전 캔버스 대응)
    const rear=(facing==='environment');
    ctx.font='800 '+Math.max(13,canvas.width/60)+'px Pretendard';
    ctx.fillStyle='#fde68a';
    if(rear){ ctx.fillText(Math.round(ang)+'°', K.x+22, K.y+5); }
    else { ctx.scale(-1,1); ctx.fillText(Math.round(ang)+'°', -(K.x-22), K.y+5); ctx.textAlign='left'; }
    ctx.restore();
  });
  ctx.shadowBlur=0;
}

// 무릎각 계산 — 발목이 보이면 정확한 3점 각도, 안 보이면 허벅지 기울기로 추정.
// (발목까지 다 보여야만 세지던 조건을 완화: 발목이 가려져도 카운트 가능)
function kneeAngleOf(lms){
  let best=null;
  for(const [h,k,a] of [[23,25,27],[24,26,28]]){
    const vh=visOf(lms[h]), vk=visOf(lms[k]), va=visOf(lms[a]);
    if(vh<0.4 || vk<0.4) continue;                 // 엉덩이·무릎은 꼭 보여야 함
    if(va>=0.15){                                   // 발목: 아주 낮은 기준만 통과하면 정확 모드
      const ang=angle(lms[h],lms[k],lms[a]);
      const score=Math.min(vh,vk,va)+1;             // 발목 보이는 다리 우선
      if(!best || score>best.score) best={ang,score};
    } else {                                        // 추정 모드: 허벅지(엉덩이→무릎)가 수직에서 기운 정도
      const dx=lms[k].x-lms[h].x, dy=lms[k].y-lms[h].y;
      const tilt=Math.atan2(Math.abs(dx),Math.max(dy,0.0001))*180/Math.PI; // 0°=서있음, 90°≈깊은 스쿼트
      const ang=Math.max(85,175-tilt*0.95);
      const score=Math.min(vh,vk);
      if(!best || score>best.score) best={ang,score};
    }
  }
  return best;
}

function updateSquat(lms){
  const st=$('stateTxt');
  // 상체(어깨·엉덩이·무릎) 평균 가시성으로만 사람 존재 판정 — 유령 카운트 방지, 발목은 안 봄
  const core=[11,12,23,24,25,26];
  let sum=0; core.forEach(i=>sum+=visOf(lms[i]));
  if(sum/core.length<0.45){
    lostFrames++;
    if(lostFrames>45) resetSquatState();            // 1.5초 이상 사라졌을 때만 상태 초기화
    st.textContent='몸이 잘 안 보여요 — 카메라 앞에 서 주세요'; st.style.color='#fbbf24';
    $('depthBar').style.width='0%';
    return 0;
  }
  lostFrames=0;
  const r=kneeAngleOf(lms);
  if(!r){
    st.textContent='엉덩이와 무릎이 보이게 서 주세요'; st.style.color='#fbbf24';
    $('depthBar').style.width='0%';
    return 0;
  }
  kneeEMA = (kneeEMA==null) ? r.ang : (kneeEMA*0.5 + r.ang*0.5);
  const knee=kneeEMA;
  const depth=Math.max(0,Math.min(1,(165-knee)/(165-DOWN_A)));
  $('depthBar').style.width=(depth*100)+'%';
  if(phase==='up'){
    if(knee<DOWN_A){ phase='down'; wentDeep=true; st.textContent='좋아요! 이제 천천히 일어나요'; st.style.color='#a3e635'; }
    else if(knee<148){ st.textContent='조금만 더 깊이 앉아요'; st.style.color='#fbbf24'; }
    else { st.textContent='천천히 앉아 보세요'; st.style.color='#22d3ee'; }
  } else {
    if(knee>UP_A){
      const now=performance.now();
      // ①실제로 깊이 앉았고 ②직전 카운트 후 0.7초 지났을 때만 +1 (디바운스)
      if(wentDeep && now-lastRepAt>700){
        reps++; lastRepAt=now;
        const n=$('repNum');
        n.textContent=reps;
        n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
        if(reps%5===0){ st.textContent=reps+'개 달성! 대단해요'; beep(880,0.22); buzz([0,60,50,60]); }
        else { st.textContent='완벽해요 +1'; beep(660,0.12); buzz(60); }
        st.style.color='#a3e635';
      }
      phase='up'; wentDeep=false;
    }
  }
  return depth;
}

function loop(){
  if(!running) return;
  if(video.readyState>=2 && video.currentTime!==lastVideoTime){
    lastVideoTime=video.currentTime;
    const now=performance.now();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let res=null;
    try{ res=pose.detectForVideo(video, now); }catch(e){}
    if(res && res.landmarks && res.landmarks[0]){
      const sm=smoothLandmarks(res.landmarks[0]);
      const depth=updateSquat(sm);
      drawPose(sm, depth);
    } else {
      smoothLms=null;
      lostFrames++;
      if(lostFrames>45) resetSquatState();
      const st=$('stateTxt');
      st.textContent='전신이 보이게 뒤로 물러나 주세요';
      st.style.color='#94c9dd';
    }
  }
  requestAnimationFrame(loop);
}

$('startBtn').onclick=async function(){
  const btn=this;
  btn.disabled=true; btn.textContent='준비 중…';
  try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  try{
    if(!pose) await loadModels();
    $('loadMsg').textContent='카메라를 켜는 중…';
    await startCam();
    $('startOverlay').style.display='none';
    $('counterBox').style.display='block';
    $('depthWrap').style.display='block';
    $('depthLbl').style.display='block';
    $('flipBtn').classList.add('show');
    $('resetBtn').classList.add('show');
    $('endBtn').classList.add('show');
    keepAwake();
    sessionActive=true; running=true; lastVideoTime=-1; loop();
  }catch(e){
    btn.disabled=false; btn.textContent='카메라 시작';
    $('loadMsg').textContent='카메라를 켤 수 없어요. 브라우저의 카메라 권한을 허용해 주세요. ('+(e && e.message || e)+')';
  }
};
$('flipBtn').onclick=async function(){
  facing=(facing==='user')?'environment':'user';
  stopCam(); lastVideoTime=-1;
  try{ await startCam(); }
  catch(e){ facing=(facing==='user')?'environment':'user'; try{ await startCam(); }catch(_){} }
};
$('resetBtn').onclick=function(){ reps=0; lastRepAt=0; resetSquatState(); $('repNum').textContent='0'; };
$('endBtn').onclick=function(){
  running=false; sessionActive=false;
  stopCam(); releaseWake();
  $('finishNum').textContent=reps;
  $('finishOverlay').style.display='flex';
};
$('againBtn').onclick=async function(){
  $('finishOverlay').style.display='none';
  reps=0; lastRepAt=0; resetSquatState(); $('repNum').textContent='0';
  try{
    await startCam();
    keepAwake();
    sessionActive=true; running=true; lastVideoTime=-1; loop();
  }catch(e){
    $('startOverlay').style.display='flex';
    $('startBtn').disabled=false; $('startBtn').textContent='카메라 시작';
  }
};
function closeWindow(){
  try{ running=false; sessionActive=false; stopCam(); releaseWake(); }catch(e){}
  window.close();
  // 새 탭으로 열려 window.close()가 막히는 브라우저 대비 → 이전 페이지(PAPS)로
  setTimeout(function(){
    if(history.length>1){ history.back(); }
    else { var h=$('closeHint'); if(h) h.textContent='이 창이 자동으로 닫히지 않으면 탭을 직접 닫아 주세요.'; }
  },250);
}
$('closeBtn').onclick=closeWindow;
$('exitBtn').onclick=closeWindow;
document.addEventListener('visibilitychange',function(){
  if(document.hidden){ running=false; }
  else if(sessionActive && video.srcObject){ keepAwake(); running=true; lastVideoTime=-1; loop(); }
});
</script>
</body>
