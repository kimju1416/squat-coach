<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020617">
<title>AI 스쿼트 코치</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#020617;font-family:'SF Mono',ui-monospace,'Menlo','Consolas',monospace;overflow:hidden;color:#e0f2fe;}
  #app{position:fixed;inset:0;}

  /* 카메라(어둡게) + 골격(밝게) */
  #stage{position:absolute;inset:0;background:#000;overflow:hidden;}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);
    filter:brightness(0.34) contrast(1.08) saturate(0.7);}
  #overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  /* 비네트 + 스캔 글로우 */
  #vignette{position:absolute;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(2,6,23,0.4) 100%);}
  #scan{position:absolute;left:0;right:0;height:2px;z-index:3;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(45,212,130,0.65),transparent);
    box-shadow:0 0 14px 2px rgba(45,212,130,0.5);animation:scan 3.6s linear infinite;}
  @keyframes scan{0%{top:8%;}50%{top:88%;}100%{top:8%;}}

  /* HUD 프레임 코너 */
  .corner{position:absolute;width:34px;height:34px;border:2px solid rgba(45,212,130,0.6);z-index:4;pointer-events:none;}
  .corner.tl{top:14px;left:14px;border-right:none;border-bottom:none;}
  .corner.tr{top:14px;right:14px;border-left:none;border-bottom:none;}
  .corner.bl{bottom:14px;left:14px;border-right:none;border-top:none;}
  .corner.br{bottom:14px;right:14px;border-left:none;border-top:none;}

  /* 상단 HUD */
  #topbar{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top) + 18px) 22px 10px;
    display:flex;justify-content:space-between;align-items:flex-start;z-index:6;pointer-events:none;}
  #sysLabel{font-size:11px;letter-spacing:1.5px;color:#8affc1;text-shadow:0 0 8px rgba(45,212,130,0.7);}
  #sysLabel .rec{color:#f87171;}
  #sysLabel .sub{display:block;font-size:9px;color:#86efac;opacity:0.7;margin-top:3px;letter-spacing:1px;}
  #counterChip{text-align:right;}
  #counterChip .n{font-size:30px;font-weight:800;color:#2dd47a;text-shadow:0 0 14px rgba(45,212,130,0.8);
    font-variant-numeric:tabular-nums;line-height:1;}
  #counterChip .t{font-size:11px;color:#86efac;letter-spacing:1px;}

  /* 큰 카운터(중앙 뒤) */
  #bigCount{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;
    font-size:150px;font-weight:800;color:rgba(45,212,130,0.16);font-variant-numeric:tabular-nums;line-height:1;}
  #bigCount.pop{animation:pop .4s cubic-bezier(.2,1.5,.4,1);}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(1);color:rgba(45,212,130,0.16);}
    45%{transform:translate(-50%,-50%) scale(1.3);color:rgba(52,211,153,0.5);}
    100%{transform:translate(-50%,-50%) scale(1);color:rgba(45,212,130,0.16);}}

  /* 하단 HUD */
  #bottom{position:absolute;left:0;right:0;bottom:0;z-index:6;
    padding:16px 22px calc(env(safe-area-inset-bottom) + 22px);
    background:linear-gradient(0deg,rgba(2,6,23,0.9),transparent);}
  #feedback{text-align:center;font-size:17px;font-weight:700;margin-bottom:14px;min-height:24px;letter-spacing:0.5px;
    color:#8affc1;text-shadow:0 0 10px rgba(45,212,130,0.5);transition:color .15s;}
  #depthWrap{display:flex;align-items:center;gap:12px;}
  #depthLabel{font-size:10px;letter-spacing:1px;color:#86efac;width:64px;}
  #depthTrack{flex:1;height:10px;background:rgba(45,212,130,0.12);border:1px solid rgba(45,212,130,0.25);
    border-radius:2px;overflow:hidden;position:relative;}
  #depthFill{height:100%;width:0%;background:#2dd47a;box-shadow:0 0 10px rgba(45,212,130,0.8);transition:width .08s linear,background .15s;}
  #depthGoal{position:absolute;top:-2px;bottom:-2px;left:66%;width:2px;background:#fbbf24;box-shadow:0 0 6px #fbbf24;}
  #angleVal{font-size:13px;font-weight:800;width:50px;text-align:right;font-variant-numeric:tabular-nums;
    color:#2dd47a;text-shadow:0 0 8px rgba(45,212,130,0.6);}

  /* 오버레이 화면 */
  .screen{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;background:radial-gradient(ellipse at center,#0b1220,#020617);}
  .screen.hidden{display:none;}
  .bigEmoji{font-size:58px;margin-bottom:16px;filter:drop-shadow(0 0 16px rgba(45,212,130,0.6));}
  .screen h1{font-size:25px;font-weight:800;margin-bottom:12px;color:#e0f2fe;letter-spacing:1px;}
  .screen p{font-size:14px;line-height:1.7;color:#94a3b8;max-width:330px;margin-bottom:8px;}
  .screen p b{color:#2dd47a;}
  .privacy{font-size:11px;color:#86efac;background:rgba(45,212,130,0.07);border:1px solid rgba(45,212,130,0.2);
    border-radius:8px;padding:11px 14px;margin:16px 0 24px;max-width:330px;letter-spacing:0.3px;}
  .btn{background:rgba(45,212,130,0.12);color:#8affc1;border:1.5px solid #2dd47a;border-radius:10px;
    padding:16px 32px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;
    box-shadow:0 0 22px rgba(45,212,130,0.35);transition:transform .12s,background .15s;}
  .btn:active{transform:scale(0.96);background:rgba(45,212,130,0.22);}
  .btn.ghost{background:transparent;box-shadow:none;border-color:rgba(45,212,130,0.4);color:#86efac;margin-top:12px;}

  #targetPick{display:flex;gap:12px;margin:8px 0 20px;}
  .tgt{width:64px;height:56px;border-radius:10px;border:1.5px solid rgba(45,212,130,0.3);background:rgba(45,212,130,0.06);
    color:#86efac;font-size:21px;font-weight:800;font-family:inherit;cursor:pointer;}
  .tgt.on{border-color:#2dd47a;background:rgba(45,212,130,0.18);color:#2dd47a;box-shadow:0 0 14px rgba(45,212,130,0.4);}

  #countdown{position:absolute;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;
    background:rgba(2,6,23,0.45);font-size:130px;font-weight:800;color:#2dd47a;text-shadow:0 0 30px rgba(45,212,130,0.8);}
  #countdown.hidden{display:none;}

  .spinner{width:44px;height:44px;border:3px solid rgba(45,212,130,0.2);border-top-color:#2dd47a;border-radius:50%;
    animation:spin .8s linear infinite;margin-bottom:18px;box-shadow:0 0 18px rgba(45,212,130,0.4);}
  @keyframes spin{to{transform:rotate(360deg);}}

  #flash{position:absolute;inset:0;z-index:5;background:radial-gradient(ellipse at center,rgba(52,211,153,0.4),transparent 70%);
    opacity:0;pointer-events:none;}
  #flash.go{animation:flash .5s ease-out;}
  @keyframes flash{0%{opacity:0;}25%{opacity:1;}100%{opacity:0;}}

  @media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms !important;}}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="vignette"></div>
    <div id="scan"></div>
    <div id="flash"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>

  <div id="topbar">
    <div id="sysLabel"><span class="rec">●</span> AI MOTION TRACKING<span class="sub">POSE TRACKING · ACTIVE</span></div>
    <div id="counterChip"><div class="n" id="chipNow">0</div><div class="t">/ <span id="chipTgt">15</span> REPS</div></div>
  </div>

  <div id="bigCount">0</div>

  <div id="bottom">
    <div id="feedback">스탠바이…</div>
    <div id="depthWrap">
      <span id="depthLabel">SQUAT DEPTH</span>
      <div id="depthTrack"><div id="depthFill"></div><div id="depthGoal"></div></div>
      <span id="angleVal">–°</span>
    </div>
  </div>

  <div id="countdown" class="hidden">3</div>

  <div id="startScreen" class="screen">
    <div class="bigEmoji">🦿</div>
    <h1>AI 스쿼트 코치</h1>
    <p>AI가 <b>온몸의 관절</b>을 실시간 추적해<br><b>제대로 앉은 스쿼트만</b> 카운트합니다.</p>
    <p style="font-size:12px;color:#64748b;">📱 폰을 세로로 세워두고 <b>전신이 다 보이게</b> 1.5~2.5m 떨어지세요.</p>
    <div id="targetPick">
      <button class="tgt" data-n="10">10</button>
      <button class="tgt on" data-n="15">15</button>
      <button class="tgt" data-n="20">20</button>
    </div>
    <div class="privacy">🔒 영상은 <b>이 기기 안에서만</b> 분석돼요. 저장·전송 없음.</div>
    <button class="btn" id="startBtn">▶ 스캔 시작</button>
  </div>

  <div id="loadScreen" class="screen hidden">
    <div class="spinner"></div>
    <p id="loadMsg">AI 추적 엔진 로딩 중…</p>
  </div>

  <div id="doneScreen" class="screen hidden">
    <div class="bigEmoji">🎉</div>
    <h1 id="doneTitle">15 REPS 완료!</h1>
    <p id="doneSub">정확한 자세로 끝까지 해냈어요. 최고예요! 💪</p>
    <button class="btn" id="againBtn">↻ 다시 하기</button>
  </div>

  <div id="errScreen" class="screen hidden">
    <div class="bigEmoji">😢</div>
    <h1>카메라를 열 수 없어요</h1>
    <p id="errMsg"></p>
    <button class="btn ghost" id="retryBtn">다시 시도</button>
  </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video=$('cam'), canvas=$('overlay'), ctx=canvas.getContext('2d');
// 페이스메쉬 제거 — 포즈 전용(가벼움)
let pose=null, stream=null, running=false, target=15;
let count=0, state='up', reachedDepth=false, lastT=-1, audioCtx=null;
const DEEP=100, STAND=160;

function angle(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y, m=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  if(!m) return 180; let cos=Math.min(1,Math.max(-1,dot/m));
  return Math.acos(cos)*180/Math.PI;
}
function beep(f,d){ try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.001,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.3,audioCtx.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.start(); o.stop(audioCtx.currentTime+d);}catch(e){} }
function buzz(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
function setFeedback(t,c){ $('feedback').textContent=t; $('feedback').style.color=c; $('feedback').style.textShadow='0 0 10px '+c.replace(')',',0.6)').replace('rgb','rgba').replace('#','rgba'); }

async function loadModels(){
  if(pose) return;
  const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  pose = await PoseLandmarker.createFromOptions(vision,{
    baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate:"GPU" },
    runningMode:"VIDEO", numPoses:1 });
}

async function openCamera(){
  stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} }, audio:false });
  video.srcObject=stream;
  await new Promise(r=>{ video.onloadedmetadata=()=>{ video.play(); r(); }; });
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
}

function loop(){
  if(!running) return;
  if(video.currentTime!==lastT){
    lastT=video.currentTime;
    const ts=performance.now();
    let pr=null;
    try{ pr=pose.detectForVideo(video,ts); }catch(e){}
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(pr && pr.landmarks && pr.landmarks.length){ drawPose(pr.landmarks[0]); processSquat(pr.landmarks[0]); }
    else { setFeedback('몸이 안 보여요 — 뒤로 물러나세요','#fbbf24'); setDepth(0,null); }
  }
  requestAnimationFrame(loop);
}

// 졸라맨 X — 얼굴/손가락 잔점 빼고 몸통·팔·다리 뼈대만 글로우 + 관절 노드
const BODY=[[11,12],[11,23],[12,24],[23,24],[11,13],[13,15],[12,14],[14,16],[23,25],[25,27],[24,26],[26,28],[27,31],[28,32]];
const MAJOR=[11,12,13,14,15,16,23,24,25,26,27,28];
function px(p){ return [p.x*canvas.width, p.y*canvas.height]; }
function vis(p){ return p && (p.visibility===undefined || p.visibility>0.5); }
function drawPose(lm){
  ctx.save();
  ctx.lineCap='round'; ctx.lineJoin='round';
  // 1) 굵고 부드러운 외곽 글로우
  ctx.shadowColor='#2dd47a'; ctx.shadowBlur=18;
  ctx.strokeStyle='rgba(45,212,130,0.30)'; ctx.lineWidth=11;
  BODY.forEach(c=>{ if(vis(lm[c[0]])&&vis(lm[c[1]])){ const a=px(lm[c[0]]),b=px(lm[c[1]]);
    ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke(); }});
  // 2) 밝은 코어 라인
  ctx.shadowBlur=10; ctx.strokeStyle='#8affc1'; ctx.lineWidth=3;
  BODY.forEach(c=>{ if(vis(lm[c[0]])&&vis(lm[c[1]])){ const a=px(lm[c[0]]),b=px(lm[c[1]]);
    ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke(); }});
  // 3) 관절 노드 (헤일로 + 링 + 코어)
  ctx.shadowColor='#2dd47a'; ctx.shadowBlur=12;
  MAJOR.forEach(i=>{ if(!vis(lm[i])) return; const q=px(lm[i]);
    ctx.beginPath(); ctx.arc(q[0],q[1],9,0,6.2832); ctx.fillStyle='rgba(45,212,130,0.22)'; ctx.fill();
    ctx.beginPath(); ctx.arc(q[0],q[1],6,0,6.2832); ctx.strokeStyle='#6ee7b7'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(q[0],q[1],2.6,0,6.2832); ctx.fillStyle='#eafff4'; ctx.fill(); ctx.shadowBlur=12; });
  ctx.restore();
}

function kneeAngle(lm){
  const ok=p=> p && (p.visibility===undefined || p.visibility>0.5);
  let a=[];
  if(ok(lm[23])&&ok(lm[25])&&ok(lm[27])) a.push(angle(lm[23],lm[25],lm[27]));
  if(ok(lm[24])&&ok(lm[26])&&ok(lm[28])) a.push(angle(lm[24],lm[26],lm[28]));
  return a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
}
function setDepth(pct,deg){
  const f=$('depthFill'); f.style.width=Math.max(0,Math.min(100,pct))+'%';
  f.style.background = pct>=66?'#34d399':(pct>=33?'#fbbf24':'#2dd47a');
  f.style.boxShadow='0 0 10px '+(pct>=66?'rgba(52,211,153,0.8)':'rgba(45,212,130,0.8)');
  $('angleVal').textContent = deg==null?'–°':Math.round(deg)+'°';
}
function processSquat(lm){
  const a=kneeAngle(lm);
  if(a==null){ setFeedback('다리가 안 보여요 — 전신이 나오게','#fbbf24'); setDepth(0,null); return; }
  setDepth((170-a)/(170-90)*100, a);
  if(state==='up'){
    if(a<=DEEP){ state='down'; reachedDepth=true; }
    else if(a<STAND) setFeedback('조금 더 깊이 앉아요 ⬇','#fbbf24');
    else setFeedback('READY — 일어선 자세 ✓','#34d399');
  }else{
    if(a<=DEEP) setFeedback('완벽한 깊이! 일어서요 ⬆','#34d399');
    else if(a>=STAND){ state='up'; if(reachedDepth) goodRep(); reachedDepth=false; }
  }
}
function goodRep(){
  count++; $('bigCount').textContent=count; $('chipNow').textContent=count;
  const b=$('bigCount'); b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
  const fl=$('flash'); fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go');
  setFeedback('REP '+count+' — 정확해요 👏','#34d399'); beep(660,0.12); buzz(40);
  if(count>=target) finish();
}
function finish(){ running=false; beep(880,0.3); buzz([0,80,50,80]);
  $('doneTitle').textContent=target+' REPS 완료!'; $('doneScreen').classList.remove('hidden'); }

async function start(){
  $('startScreen').classList.add('hidden'); $('loadScreen').classList.remove('hidden');
  try{
    $('loadMsg').textContent='AI 추적 엔진 로딩 중…';
    await loadModels();
    $('loadMsg').textContent='카메라 켜는 중…';
    await openCamera();
  }catch(e){ $('loadScreen').classList.add('hidden'); showError(e); return; }
  $('loadScreen').classList.add('hidden');
  await begin();
}
function begin(){
  count=0; state='up'; reachedDepth=false; $('bigCount').textContent='0'; $('chipNow').textContent='0';
  return countdown().then(()=>{ running=true; lastT=-1; setFeedback('시작! 천천히 정확하게 🦿','#8affc1'); loop(); });
}
function countdown(){ return new Promise(res=>{ const el=$('countdown'); let n=3;
  el.textContent=n; el.classList.remove('hidden'); beep(440,0.1);
  const t=setInterval(()=>{ n--; if(n<=0){ clearInterval(t); el.classList.add('hidden'); res(); }
    else { el.textContent=n; beep(440,0.1); buzz(20); } },800); }); }

function showError(e){
  let m='카메라 권한을 허용해 주세요.';
  if(e&&e.name==='NotAllowedError') m='카메라 사용을 허용하지 않았어요. 주소창의 카메라 아이콘에서 허용해 주세요.';
  else if(e&&e.name==='NotFoundError') m='카메라를 찾을 수 없어요. 모바일에서 열어주세요.';
  else if(location.protocol!=='https:'&&location.hostname!=='localhost') m='카메라는 https에서만 작동해요.';
  else if(e&&e.message) m=e.message;
  $('errMsg').textContent=m; $('errScreen').classList.remove('hidden');
}

document.querySelectorAll('.tgt').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tgt').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); target=+b.dataset.n; $('chipTgt').textContent=target; }));
$('startBtn').addEventListener('click',start);
$('againBtn').addEventListener('click',()=>{ $('doneScreen').classList.add('hidden'); begin(); });
$('retryBtn').addEventListener('click',()=>{ $('errScreen').classList.add('hidden'); start(); });
</script>
</body>
</html>
