<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#02060f">
<meta property="og:title" content="AI 모션 트레이닝 센터">
<meta property="og:description" content="카메라가 자세를 인식해 운동을 세어주고, 게임으로 반응속도를 재고, 자세까지 분석해줘요. 영상은 기기 밖으로 나가지 않아요.">
<title>AI 모션 트레이닝 센터</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  /* v2.0 통합판: 스쿼트+팔벌려뛰기+게임3종+자세분석 */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#02060f;overflow:hidden;font-family:'Pretendard',sans-serif;color:#e8faff;word-break:keep-all;
    overscroll-behavior:none;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  button{font-family:inherit;}
  #stage{position:fixed;inset:0;background:#000;}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);
    filter:brightness(0.42) contrast(1.06) saturate(0.75);}
  video.rear{transform:none;}
  /* 캔버스는 화면픽셀 좌표계(미러는 JS에서 처리) — 골격·게임 타겟·글자 모두 여기 */
  canvas#cv{position:absolute;inset:0;width:100%;height:100%;}
  #vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at center,transparent 48%,rgba(2,6,23,0.5) 100%);}
  #scan{position:absolute;left:0;right:0;height:2px;z-index:3;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(34,211,238,0.6),transparent);
    box-shadow:0 0 14px 2px rgba(34,211,238,0.45);animation:scan 3.8s linear infinite;}
  @keyframes scan{0%{top:8%;}50%{top:88%;}100%{top:8%;}}
  .corner{position:absolute;width:36px;height:36px;border:2px solid rgba(34,211,238,.55);z-index:4;pointer-events:none;filter:drop-shadow(0 0 6px rgba(34,211,238,.6));}
  .c-tl{top:12px;left:12px;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
  .c-tr{top:12px;right:12px;border-left:none;border-bottom:none;border-radius:0 8px 0 0;}
  .c-bl{bottom:12px;left:12px;border-right:none;border-top:none;border-radius:0 0 0 8px;}
  .c-br{bottom:12px;right:12px;border-left:none;border-top:none;border-radius:0 0 8px 0;}

  /* ===== 실행 중 HUD ===== */
  #hudTop{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;display:none;justify-content:space-between;align-items:flex-start;z-index:6;gap:8px;}
  #hudTop.show{display:flex;}
  .hud-name{font-size:13px;font-weight:800;letter-spacing:2px;color:#22d3ee;text-shadow:0 0 12px rgba(34,211,238,.8);white-space:nowrap;padding-top:10px;}
  .hud-btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
  .hbtn{display:none;align-items:center;justify-content:center;writing-mode:horizontal-tb;
    background:rgba(8,20,40,.65);border:1px solid rgba(34,211,238,.4);color:#a5f3fc;border-radius:10px;
    padding:0 13px;font-size:13px;font-weight:700;cursor:pointer;backdrop-filter:blur(6px);
    min-height:42px;min-width:52px;white-space:nowrap;flex:0 0 auto;line-height:1;}
  .hbtn.show{display:inline-flex;}
  .hbtn.red{border-color:rgba(251,113,133,.5);color:#fda4af;}
  #counterBox{position:absolute;top:calc(env(safe-area-inset-top) + 62px);left:14px;z-index:6;display:none;
    background:rgba(4,12,26,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(34,211,238,.22);border-radius:18px;padding:8px 16px 10px;}
  #repNum{font-size:min(19vw,78px);font-weight:900;line-height:.95;letter-spacing:-3px;color:#fff;
    text-shadow:0 0 24px rgba(34,211,238,.9),0 0 60px rgba(34,211,238,.5);font-variant-numeric:tabular-nums;}
  #repNum.pop{animation:pop .35s cubic-bezier(.2,1.6,.4,1);}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.18);}100%{transform:scale(1);}}
  #repLbl{font-size:12px;font-weight:800;letter-spacing:4px;color:#7dd3fc;margin-top:2px;}
  #timerChip{position:absolute;top:calc(env(safe-area-inset-top) + 66px);right:14px;z-index:6;display:none;text-align:right;
    background:rgba(4,12,26,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(251,191,36,.25);border-radius:16px;padding:7px 14px 9px;
    font-size:min(8.4vw,34px);font-weight:900;color:#fbbf24;text-shadow:0 0 16px rgba(251,191,36,.7);font-variant-numeric:tabular-nums;}
  #timerChip .u{display:block;font-size:11px;letter-spacing:3px;color:#fcd34d;font-weight:800;}
  #stateTxt{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 112px);
    max-width:92vw;text-align:center;font-size:min(5.6vw,23px);font-weight:900;letter-spacing:-.5px;z-index:6;
    color:#22d3ee;text-shadow:0 0 16px currentColor;transition:color .15s;
    background:rgba(4,12,26,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(148,163,184,.16);border-radius:16px;padding:9px 18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #stateTxt:empty{display:none;}
  #depthWrap{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 84px);width:min(72vw,320px);height:10px;border-radius:99px;background:rgba(148,163,184,.22);overflow:hidden;z-index:6;border:1px solid rgba(34,211,238,.3);display:none;}
  #depthBar{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#22d3ee,#a3e635);box-shadow:0 0 14px rgba(163,230,53,.7);transition:width .08s linear;}
  #privacy{position:absolute;bottom:calc(env(safe-area-inset-bottom) + 10px);left:0;right:0;text-align:center;font-size:10.5px;color:#4e6a8a;z-index:6;}
  #countdown{position:absolute;inset:0;z-index:18;display:none;align-items:center;justify-content:center;
    background:rgba(2,6,15,.45);font-size:min(34vw,150px);font-weight:900;color:#22d3ee;text-shadow:0 0 34px rgba(34,211,238,.8);}

  /* ===== 오버레이 화면 공통 ===== */
  .screen{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;background:radial-gradient(700px 420px at 50% 24%, rgba(34,211,238,.12), transparent 65%), rgba(2,6,15,.95);}
  .screen.show{display:flex;}
  .cta{background:linear-gradient(135deg,#0891b2,#7c3aed);color:#fff;border:none;border-radius:16px;padding:17px 44px;
    font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 0 32px rgba(34,211,238,.45);min-height:54px;white-space:nowrap;}
  .cta:disabled{opacity:.6;}
  .ghost{background:transparent;color:#a5f3fc;border:1.5px solid rgba(34,211,238,.5);border-radius:16px;
    padding:15px 30px;font-size:16px;font-weight:800;cursor:pointer;min-height:52px;white-space:nowrap;}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

  /* ===== 허브 ===== */
  #hubScr{justify-content:flex-start;overflow-y:auto;padding:0;display:none;}
  #hubScr.show{display:block;}
  .hub-in{max-width:520px;margin:0 auto;padding:34px 18px 30px;}
  #hubScr h1{font-size:clamp(26px,7.4vw,40px);font-weight:900;letter-spacing:-1px;text-align:center;
    background:linear-gradient(110deg,#7fefff,#c79bff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hub-sub{text-align:center;font-size:13px;color:#9fb6d8;margin:10px 0 22px;line-height:1.6;}
  .hub-sec{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:800;letter-spacing:3px;color:#5f7ea0;margin:22px 4px 10px;text-align:left;white-space:nowrap;}
  .hub-sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(148,163,184,.3),transparent);}
  .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .hcard{position:relative;text-align:left;background:rgba(255,255,255,.045);border:1px solid rgba(148,163,184,.22);border-radius:18px;
    padding:16px 15px 14px;cursor:pointer;color:#e8faff;transition:transform .1s;overflow:hidden;}
  .hcard:active{transform:scale(.97);}
  .hcard.wide{grid-column:1/-1;}
  .hcard .ic{font-size:30px;line-height:1;filter:drop-shadow(0 0 10px var(--c,rgba(34,211,238,.6)));}
  .hcard .tt{font-size:16.5px;font-weight:900;margin:9px 0 4px;}
  .hcard .dd{font-size:11.5px;color:#93a9c8;line-height:1.5;}
  .hcard .bst{margin-top:8px;font-size:10.5px;font-weight:800;color:var(--tc,#22d3ee);min-height:13px;}
  .hcard::after{content:'';position:absolute;inset:0;border-radius:18px;pointer-events:none;
    border:1px solid transparent;background:linear-gradient(135deg,var(--c,rgba(34,211,238,.35)),transparent 55%) border-box;
    -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;}
  .hub-foot{text-align:center;font-size:10.5px;color:#4e6a8a;margin-top:22px;line-height:1.7;}

  /* ===== 인트로 ===== */
  #introScr .big{font-size:56px;filter:drop-shadow(0 0 16px rgba(34,211,238,.55));}
  #introScr h2{font-size:clamp(23px,6.4vw,34px);font-weight:900;margin:12px 0 10px;}
  #introScr p{font-size:clamp(13px,3.7vw,15.5px);color:#9fb6d8;line-height:1.75;max-width:420px;margin-bottom:6px;}
  #introScr p b{color:#a5f3fc;}
  #introBest{font-size:12.5px;font-weight:800;color:#fbbf24;margin:8px 0 2px;min-height:1em;}
  #introScr .btn-row{margin-top:22px;}
  #loadMsg{margin-top:14px;font-size:12.5px;color:#5f7ea0;min-height:1.2em;max-width:420px;line-height:1.5;}

  /* ===== 결과 ===== */
  #resultScr #resNum{font-size:min(26vw,110px);font-weight:900;line-height:1;letter-spacing:-4px;color:#fff;
    text-shadow:0 0 30px rgba(163,230,53,.8),0 0 70px rgba(163,230,53,.4);}
  #resSub{font-size:clamp(15px,4vw,19px);font-weight:800;color:#a5f3fc;letter-spacing:1px;margin-top:8px;}
  #resDetail{margin-top:14px;font-size:13px;color:#9fb6d8;line-height:1.9;max-width:340px;}
  #resDetail .nb{color:#fbbf24;font-weight:800;}
  #resultScr .btn-row{margin-top:28px;}

  /* ===== 자세분석 리포트 ===== */
  #reportScr{display:none;position:absolute;inset:0;z-index:22;background:#050b18;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  #reportScr.show{display:block;}
  .rp-in{max-width:560px;margin:0 auto;padding:26px 16px 40px;}
  .rp-in h2{font-size:24px;font-weight:900;text-align:center;
    background:linear-gradient(110deg,#7fefff,#c79bff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .rp-date{text-align:center;font-size:11.5px;color:#5f7ea0;margin:6px 0 18px;}
  .score-wrap{display:flex;align-items:center;justify-content:center;gap:18px;margin:4px 0 18px;}
  .score-ring{width:112px;height:112px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    background:conic-gradient(var(--c,#a3e635) calc(var(--p)*1%), rgba(148,163,184,.15) 0);
    filter:drop-shadow(0 0 14px rgba(45,212,191,.35));}
  .score-ring span{width:84px;height:84px;border-radius:50%;background:#050b18;display:flex;align-items:center;justify-content:center;
    font-size:36px;font-weight:900;color:#fff;}
  .score-side{text-align:left;min-width:0;}
  .sc-band{font-size:16px;font-weight:900;}
  .sc-rel{font-size:11.5px;color:#5f7ea0;margin-top:6px;line-height:1.55;}
  .rp-snaps{display:flex;gap:10px;margin-bottom:16px;}
  .rp-snaps figure{flex:1;min-width:0;}
  .rp-snaps img{width:100%;border-radius:14px;border:1px solid rgba(34,211,238,.3);display:block;}
  .rp-snaps figcaption{font-size:11px;color:#7dd3fc;text-align:center;margin-top:5px;font-weight:700;}
  .rp-summary{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
  .sm-chip{border-radius:99px;padding:8px 16px;font-size:13px;font-weight:900;}
  .g0{background:rgba(163,230,53,.14);color:#bef264;border:1px solid rgba(163,230,53,.4);}
  .g1{background:rgba(251,191,36,.13);color:#fcd34d;border:1px solid rgba(251,191,36,.4);}
  .g2{background:rgba(251,113,133,.13);color:#fda4af;border:1px solid rgba(251,113,133,.45);}
  .rp-sec{font-size:12px;font-weight:800;letter-spacing:3px;color:#5f7ea0;margin:22px 2px 10px;}
  .m-card{background:rgba(255,255,255,.045);border:1px solid rgba(148,163,184,.2);border-radius:16px;padding:14px 15px;margin-bottom:10px;text-align:left;}
  .m-top{display:flex;align-items:center;gap:9px;}
  .m-top .ic{font-size:20px;}
  .m-top .nm{font-size:15px;font-weight:900;flex:1;}
  .m-chip{border-radius:99px;padding:5px 12px;font-size:11.5px;font-weight:900;white-space:nowrap;}
  .m-val{font-size:13px;color:#cbe6ff;margin:8px 0 7px;font-weight:700;}
  .m-val b{color:#fff;font-size:15px;}
  .m-gauge{height:7px;border-radius:99px;background:rgba(148,163,184,.18);overflow:hidden;margin-bottom:8px;}
  .m-gauge i{display:block;height:100%;border-radius:99px;}
  .m-desc{font-size:12px;color:#93a9c8;line-height:1.65;}
  .rx-card{background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.3);border-radius:16px;padding:14px 15px;margin-bottom:10px;text-align:left;}
  .rx-card .rt{font-size:14.5px;font-weight:900;display:flex;align-items:center;gap:8px;}
  .rx-card .rh{font-size:12px;color:#9fb6d8;line-height:1.7;margin:7px 0;}
  .rx-card .rd{font-size:12px;font-weight:800;color:#a3e635;}
  .rx-go{margin-top:9px;background:rgba(34,211,238,.14);border:1px solid rgba(34,211,238,.5);color:#a5f3fc;
    border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:800;cursor:pointer;min-height:38px;}
  .rp-warn{margin-top:18px;font-size:11px;color:#8093ad;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.2);
    border-radius:12px;padding:12px 14px;line-height:1.7;text-align:left;}
  .rp-btns{display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
  /* 리포트 이미지 저장 미리보기 모달 */
  #imgModal{display:none;position:fixed;inset:0;z-index:60;background:rgba(2,6,15,.97);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 16px 40px;}
  #imgModal.show{display:block;}
  .im-in{max-width:430px;margin:0 auto;text-align:center;}
  .im-hint{font-size:13.5px;font-weight:800;color:#a3e635;background:rgba(163,230,53,.1);border:1px solid rgba(163,230,53,.35);
    border-radius:14px;padding:12px 16px;margin-bottom:14px;line-height:1.6;}
  #imgPrev{width:100%;border-radius:16px;border:1px solid rgba(34,211,238,.35);display:block;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(8,20,40,.94);
    border:1px solid rgba(251,113,133,.5);color:#fda4af;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:700;
    z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s;max-width:86vw;text-align:center;}
  .toast.show{opacity:1;}
  /* 자세분석: 유형 배지·촬영품질·종합소견·이력 추이 */
  .type-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.35);
    border-radius:99px;padding:9px 18px;font-size:14.5px;font-weight:900;color:#5eead4;margin:2px 0 12px;}
  .quality-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
  .q-chip{font-size:10.5px;font-weight:700;color:#7dd3fc;background:rgba(125,211,252,.08);border:1px solid rgba(125,211,252,.25);
    border-radius:99px;padding:5px 11px;}
  .narrative{font-size:13px;color:#c8dcf0;line-height:1.85;background:rgba(255,255,255,.035);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;text-align:left;}
  .trend-wrap{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.18);
    border-radius:16px;padding:13px 16px;margin-bottom:16px;text-align:left;}
  .trend-bars{display:flex;align-items:flex-end;gap:5px;height:44px;flex:0 0 auto;}
  .trend-bars i{display:block;width:9px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#2dd4bf,#0891b2);}
  .trend-txt{font-size:11.5px;color:#9fb6d8;line-height:1.6;}
</style>
</head>
<body>
<div id="stage">
  <video id="cam" autoplay playsinline muted></video>
  <canvas id="cv"></canvas>
  <div id="vignette"></div>
  <div id="scan"></div>
  <div class="corner c-tl"></div><div class="corner c-tr"></div>
  <div class="corner c-bl"></div><div class="corner c-br"></div>

  <div id="hudTop">
    <div class="hud-name" id="hudName">AI MOTION</div>
    <div class="hud-btns">
      <button class="hbtn show" id="menuBtn">메뉴</button>
      <button class="hbtn" id="flipBtn">화면 전환</button>
      <button class="hbtn" id="viewBtn">전체 보기</button>
      <button class="hbtn" id="resetBtn">0으로</button>
      <button class="hbtn red" id="endBtn">종료</button>
    </div>
  </div>
  <div id="counterBox"><div id="repNum">0</div><div id="repLbl">SQUATS</div></div>
  <div id="timerChip"><span id="timerVal">45</span><span class="u" id="timerUnit">SEC</span></div>
  <div id="stateTxt"></div>
  <div id="depthWrap"><div id="depthBar"></div></div>
  <div id="privacy">영상은 저장·전송되지 않고 기기 안에서만 처리돼요</div>
  <div id="countdown">3</div>

  <!-- 허브 -->
  <div id="hubScr" class="screen show">
    <div class="hub-in">
      <h1>AI 모션 트레이닝 센터</h1>
      <div class="hub-sub">카메라가 몸의 관절을 인식해요.<br>폰을 세워두고 <b style="color:#a5f3fc">2~3걸음 뒤로</b> 물러나 전신이 보이게 해 주세요.</div>
      <div class="hub-sec">운동 카운터</div>
      <div class="hub-grid">
        <button class="hcard" data-ex="squat" style="--c:rgba(34,211,238,.5);--tc:#22d3ee"><span class="ic">🏋️</span><div class="tt">스쿼트</div><div class="dd">깊이 앉았다 일어나면 자동으로 1회</div><div class="bst" data-best="squat"></div></button>
        <button class="hcard" data-ex="jacks" style="--c:rgba(163,230,53,.5);--tc:#a3e635"><span class="ic">🤸</span><div class="tt">팔벌려뛰기</div><div class="dd">팔 올리고 다리 벌리면 1회</div><div class="bst" data-best="jacks"></div></button>
      </div>
      <div class="hub-sec">미니게임 아케이드</div>
      <div class="hub-grid">
        <button class="hcard" data-ex="mole" style="--c:rgba(251,191,36,.5);--tc:#fbbf24"><span class="ic">👾</span><div class="tt">두더지 잡기</div><div class="dd">60초 안에 손으로 최대한 많이!</div><div class="bst" data-best="mole"></div></button>

<script type="module">
import { PoseLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

/* ============================================================
   공용 코어: 카메라·포즈엔진·좌표계·오디오·라우터
   ============================================================ */
const $=id=>document.getElementById(id);
const video=$('cam'), canvas=$('cv'), ctx=canvas.getContext('2d');
const params=new URLSearchParams(location.search);
const DEBUG=params.get('debug')==='1';        // 가상 모드: 카메라·모델 없이 window.__fakeLms로 구동(개발 검증용)

let pose=null, running=false, camOn=false, facing='user';
let smoothLms=null, lastVideoTime=-1;
let audioCtx=null, wakeLock=null;
let current=null;                              // 현재 활동 객체

/* ---------- 화면 좌표계: video는 object-fit:cover, 캔버스는 화면픽셀 ---------- */
const map={s:1,ox:0,oy:0,W:0,H:0,vw:720,vh:1280};
function updateMap(){
  const W=window.innerWidth||375, H=window.innerHeight||812;   // 숨겨진 embed 등 0×0 보고 방어
  const vw=(camOn&&video.videoWidth)?video.videoWidth:720;
  const vh=(camOn&&video.videoHeight)?video.videoHeight:1280;
  // 화면비와 영상비 차이가 크면(태블릿 등) cover 대신 contain — 전신이 잘려 "카메라가 너무 가까운" 느낌 방지
  const vA=vw/vh, sA=W/H;
  const mismatch=Math.max(vA/sA,sA/vA);
  // 사용자가 [전체 보기]를 켜면 항상 contain(카메라 시야 전부 표시 — 태블릿에서 가까워 보일 때)
  const mode=(viewPref==='contain')?'contain':(mismatch>1.12?'contain':'cover');
  const s=mode==='contain'?Math.min(W/vw,H/vh):Math.max(W/vw,H/vh);
  map.s=s; map.ox=(W-vw*s)/2; map.oy=(H-vh*s)/2; map.W=W; map.H=H; map.vw=vw; map.vh=vh; map.mode=mode;
  canvas.width=W; canvas.height=H;
  if(camOn) video.style.objectFit=mode;
  const vb=document.getElementById('viewBtn');
  if(vb) vb.textContent=(mode==='contain')?'꽉 채우기':'전체 보기';
}
let viewPref='contain';   // 기본값: 전체 보기 — 카메라 시야 전부(발끝까지) 항상 표시
try{ viewPref=localStorage.getItem('mc_view')||'contain'; }catch(e){}
window.addEventListener('resize',updateMap);
updateMap();
// 정규화 랜드마크 → 화면픽셀 (전면캠 미러 반영: 화면에 보이는 위치와 일치)
function toPx(l){
  let x=l.x*map.vw*map.s+map.ox;
  const y=l.y*map.vh*map.s+map.oy;
  if(facing==='user') x=map.W-x;
  return {x,y};
}
function visOf(l){ return (l&&l.visibility!=null)?l.visibility:1; }

function angle(a,b,c){ // b를 꼭짓점으로 하는 각도(0~180)
  const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y, m=Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  if(!m) return 180;
  return Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI;
}

/* ---------- 랜드마크 EMA 스무딩 ---------- */
function smoothLandmarks(lms){
  if(!smoothLms||smoothLms.length!==lms.length){
    smoothLms=lms.map(l=>({x:l.x,y:l.y,z:l.z,visibility:l.visibility}));
    return smoothLms;
  }
  for(let i=0;i<lms.length;i++){
    // 속도 적응 스무딩: 정지 시엔 부드럽게(떨림 억제), 빠르게 움직이면 바로 따라감(게임 손 지연 제거)
    const d=Math.hypot(lms[i].x-smoothLms[i].x, lms[i].y-smoothLms[i].y);
    const a=Math.min(0.92, 0.35 + d*30);
    smoothLms[i].x=smoothLms[i].x*(1-a)+lms[i].x*a;
    smoothLms[i].y=smoothLms[i].y*(1-a)+lms[i].y*a;
    smoothLms[i].z=(smoothLms[i].z||0)*(1-a)+(lms[i].z||0)*a;
    smoothLms[i].visibility=lms[i].visibility;
  }
  return smoothLms;
}

/* ---------- 오디오·진동·화면꺼짐방지 ---------- */
function initAudio(){ try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
function beep(f,d,vol){
  try{
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain(), t=audioCtx.currentTime;
    o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.25,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+d);
    o.start(t); o.stop(t+d);
  }catch(e){}
}
function buzz(p){ if(navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
async function keepAwake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }

/* ---------- 기기 수평 센서(중력 벡터) — 자세분석 정확도 보장 ---------- */
const tilt={roll:null,pitch:null,ts:0,listening:false};
function onMotion(e){
  const g=e.accelerationIncludingGravity;
  if(!g||g.x==null) return;
  // 포트레이트 기준: roll=좌우 기울기(가로 측정 왜곡의 주범), pitch=앞뒤 기울기
  let roll=Math.atan2(g.x,g.y)*180/Math.PI;
  // iOS 부호 반전·가로모드 등 어떤 방향이든 가장 가까운 바른 방향 기준으로 접기
  while(roll>45) roll-=90; while(roll<-45) roll+=90;
  const pitch=Math.atan2(g.z,Math.hypot(g.x,g.y))*180/Math.PI;
  tilt.roll=(tilt.roll==null)?roll:tilt.roll*0.8+roll*0.2;
  tilt.pitch=(tilt.pitch==null)?pitch:tilt.pitch*0.8+pitch*0.2;
  tilt.ts=performance.now();
}
async function initTilt(){
  if(tilt.listening) return;
  try{
    if(typeof DeviceMotionEvent!=='undefined'&&DeviceMotionEvent.requestPermission){
      const p=await DeviceMotionEvent.requestPermission();   // iOS: 사용자 제스처 내에서만
      if(p!=='granted') return;
    }
  }catch(e){}
  try{ window.addEventListener('devicemotion',onMotion); tilt.listening=true; }catch(e){}
}
function tiltNow(){
  if(DEBUG&&window.__fakeTilt) return {ok:true,roll:window.__fakeTilt.roll||0,pitch:window.__fakeTilt.pitch||0};
  if(tilt.roll==null||performance.now()-tilt.ts>2000) return {ok:false,roll:0,pitch:0};
  return {ok:true,roll:tilt.roll,pitch:tilt.pitch};
}

/* ---------- 엔진 로딩·카메라 ---------- */
async function loadModels(){
  if(pose||DEBUG) return;
  $('loadMsg').textContent='AI 모델을 불러오는 중… (첫 실행은 10초쯤 걸려요)';
  const files=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  pose=await PoseLandmarker.createFromOptions(files,{
    baseOptions:{
      modelAssetPath:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task',
      delegate:'GPU'
    },
    runningMode:'VIDEO', numPoses:1,
    minPoseDetectionConfidence:0.3, minPosePresenceConfidence:0.3, minTrackingConfidence:0.3
  });
}
async function startCam(){
  if(DEBUG){ camOn=true; updateMap(); return; }
  if(camOn&&video.srcObject) return;
  // 예전(v2.2) 방식으로 복원 — 고해상도/resizeMode/줌 조작이 기기에 따라 시야를 좁혀
  // 무릎 아래가 잘리는 문제가 있었음. 단순 요청이 전신이 가장 잘 나옴.
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:facing, width:{ideal:1280}, height:{ideal:720} }, audio:false });
  video.srcObject=stream;
  video.classList.toggle('rear', facing==='environment');
  await new Promise(r=>video.onloadedmetadata=r);
  await video.play();
  camOn=true; updateMap();
}
function stopCam(){
  const s=video.srcObject;
  if(s) s.getTracks().forEach(t=>t.stop());
  video.srcObject=null; camOn=false;
}

/* ---------- 메인 루프 ---------- */
function loop(){
  if(!running) return;
  let fresh=false, lms=null;
  if(DEBUG){ fresh=true; lms=window.__fakeLms||null; }
  else if(video.readyState>=2&&video.currentTime!==lastVideoTime){
    lastVideoTime=video.currentTime; fresh=true;
    let res=null;
    try{ res=pose.detectForVideo(video,performance.now()); }catch(e){}
    if(res&&res.landmarks&&res.landmarks[0]) lms=smoothLandmarks(res.landmarks[0]);
    else smoothLms=null;
  }
  if(fresh){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(current&&current.frame) current.frame(lms);
  }
  requestAnimationFrame(loop);
}

/* ---------- 골격 그리기 (화면 좌표) ---------- */
const BONES=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[27,31],[28,32]];
function drawPose(lms,col){
  col=col||'#22d3ee';
  ctx.lineWidth=Math.max(3,map.W/140);
  ctx.lineCap='round'; ctx.shadowBlur=18; ctx.shadowColor=col; ctx.strokeStyle=col;
  BONES.forEach(([a,b])=>{
    if(visOf(lms[a])<0.2||visOf(lms[b])<0.2) return;
    const A=toPx(lms[a]),B=toPx(lms[b]);
    ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
  });
  ctx.shadowBlur=14;
  [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i=>{
    if(visOf(lms[i])<0.2) return;
    const p=toPx(lms[i]);
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(4,map.W/90),0,Math.PI*2); ctx.fillStyle='#e0faff'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(7,map.W/55),0,Math.PI*2); ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  });
  ctx.shadowBlur=0;
}
// 손 위치(화면픽셀): 손목 + 검지끝 — 게임 판정용
function handPoints(lms){
  const pts=[];
  [15,16,19,20].forEach(i=>{ if(lms[i]&&visOf(lms[i])>0.4) pts.push(toPx(lms[i])); });
  return pts;
}
function drawHandGlow(pts,col){
  ctx.save(); ctx.shadowBlur=22; ctx.shadowColor=col||'#fbbf24';
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(10,map.W/34),0,Math.PI*2);
    ctx.fillStyle='rgba(251,191,36,.25)'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(5,map.W/70),0,Math.PI*2); ctx.fillStyle='#fff7d6'; ctx.fill(); });
  ctx.restore();
}
// 좌/우 손 중심 + 속도(px/s) 추적 — 손목·검지·새끼·엄지 중 보이는 점 평균. 게임 판정용.
let handTrack={L:null,R:null};
function hands2(lms){
  const now=performance.now(), out=[];
  [['L',15,19,17,21],['R',16,20,18,22]].forEach(arr=>{
    const k=arr[0];
    const pts=arr.slice(1).filter(i=>lms[i]&&visOf(lms[i])>0.3).map(i=>toPx(lms[i]));
    if(!pts.length){ handTrack[k]=null; return; }
    const x=pts.reduce((s,p)=>s+p.x,0)/pts.length, y=pts.reduce((s,p)=>s+p.y,0)/pts.length;
    const prev=handTrack[k];
    const dt=prev?Math.max(16,now-prev.t):16;
    const h={x,y,px:prev?prev.x:x,py:prev?prev.y:y,
      vx:prev?(x-prev.x)/dt*1000:0, vy:prev?(y-prev.y)/dt*1000:0,
      spd:0,t:now};
    h.spd=Math.hypot(h.vx,h.vy);
    handTrack[k]=h; out.push(h);
  });
  return out;
}
// 이전→현재 손 이동 '선분'이 원을 통과하면 히트 — 빠른 손이 프레임 사이로 타겟을 지나쳐도 인식(터널링 방지)
function segHit(h,cx,cy,r){
  const dx=h.x-h.px, dy=h.y-h.py, L2=dx*dx+dy*dy;
  if(L2<1) return Math.hypot(h.x-cx,h.y-cy)<r;
  let t=((cx-h.px)*dx+(cy-h.py)*dy)/L2; t=Math.max(0,Math.min(1,t));
  return Math.hypot(h.px+dx*t-cx, h.py+dy*t-cy)<r;
}
function anySegHit(hs,cx,cy,r){ return hs.some(h=>segHit(h,cx,cy,r)); }
function anyNear(hs,cx,cy,r){ return hs.some(h=>Math.hypot(h.x-cx,h.y-cy)<r); }
function rrCtx(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,r); else ctx.rect(x,y,w,h); }
function setState(t,c){ const s=$('stateTxt'); s.textContent=t; s.style.color=c||'#22d3ee'; }
function toast(msg){
  let t=document.getElementById('toastEl');
  if(!t){ t=document.createElement('div'); t.id='toastEl'; t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show');

}

const ACT={};

/* ---------- 공통: 카운터형(스쿼트·팔벌려뛰기) 상태 ---------- */
function makeCounter(cfg){
  const S={reps:0,lastRepAt:0,lostFrames:0};
  return {
    key:cfg.key, hud:{counter:true,reset:true,end:true,depth:!!cfg.depth},
    label:cfg.label,
    start(){ S.reps=0; S.lastRepAt=0; S.lostFrames=0; cfg.reset(S);
      $('repNum').textContent='0'; $('repLbl').textContent=cfg.label; },
    reset(){ S.reps=0; S.lastRepAt=0; cfg.reset(S); $('repNum').textContent='0'; },
    end(){
      const r=S.reps, prev=+(best.get(cfg.key)||0);
      if(r>prev) best.set(cfg.key,r);
      showResult({num:r,sub:'개 완료했어요',detail:r>prev?'🏆 최고 기록 경신!':''});
    },
    frame(lms){
      if(!lms){ S.lostFrames++; if(S.lostFrames>45) cfg.reset(S);
        setState('전신이 보이게 뒤로 물러나 주세요','#94c9dd'); return; }
      // 사람 존재: 어깨·엉덩이 중심 가시성
      const core=[11,12,23,24]; let sum=0; core.forEach(i=>sum+=visOf(lms[i]));
      if(sum/core.length<0.45){
        S.lostFrames++; if(S.lostFrames>45) cfg.reset(S);
        setState('몸이 잘 안 보여요 — 카메라 앞에 서 주세요','#fbbf24'); return;
      }
      S.lostFrames=0;
      drawPose(lms,cfg.color);
      cfg.judge(S,lms);
    },
    _S:S,
    _rep(msg){
      const now=performance.now();
      if(now-S.lastRepAt<cfg.debounce) return false;
      S.reps++; S.lastRepAt=now;
      const n=$('repNum'); n.textContent=S.reps;
      n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
      if(S.reps%5===0){ setState(S.reps+'개 달성! 대단해요','#a3e635'); beep(880,0.22); buzz([0,60,50,60]); }
      else{ setState(msg||'완벽해요 +1','#a3e635'); beep(660,0.12); buzz(60); }
      return true;
    }
  };
}

/* ---------- 스쿼트 ---------- */
ACT.squat=(()=>{
  const st={phase:'up',kneeEMA:null,wentDeep:false};
  const DOWN_A=112, UP_A=150;
  // 발목이 보이면 정확한 무릎각, 안 보이면 허벅지 기울기로 추정(발목 조건 완화)
  function kneeAngleOf(lms){
    let bst=null;
    for(const [h,k,a] of [[23,25,27],[24,26,28]]){
      const vh=visOf(lms[h]),vk=visOf(lms[k]),va=visOf(lms[a]);
      if(vh<0.4||vk<0.4) continue;
      if(va>=0.15){
        const ang=angle(lms[h],lms[k],lms[a]), score=Math.min(vh,vk,va)+1;
        if(!bst||score>bst.score) bst={ang,score};
      }else{
        const dx=lms[k].x-lms[h].x, dy=lms[k].y-lms[h].y;
        const tilt=Math.atan2(Math.abs(dx),Math.max(dy,0.0001))*180/Math.PI;
        const ang=Math.max(85,175-tilt*0.95), score=Math.min(vh,vk);
        if(!bst||score>bst.score) bst={ang,score};
      }
    }
    return bst;
  }
  const c=makeCounter({
    key:'squat',label:'SQUATS',color:'#22d3ee',depth:true,debounce:700,
    reset(){ st.phase='up'; st.kneeEMA=null; st.wentDeep=false; },
    judge(S,lms){
      const r=kneeAngleOf(lms);
      if(!r){ setState('엉덩이와 무릎이 보이게 서 주세요','#fbbf24'); $('depthBar').style.width='0%'; return; }
      st.kneeEMA=(st.kneeEMA==null)?r.ang:(st.kneeEMA*0.5+r.ang*0.5);
      const knee=st.kneeEMA;
      const depth=Math.max(0,Math.min(1,(165-knee)/(165-DOWN_A)));
      $('depthBar').style.width=(depth*100)+'%';
      if(st.phase==='up'){
        if(knee<DOWN_A){ st.phase='down'; st.wentDeep=true; setState('좋아요! 이제 천천히 일어나요','#a3e635'); }
        else if(knee<148) setState('조금만 더 깊이 앉아요','#fbbf24');
        else setState('천천히 앉아 보세요','#22d3ee');
      }else if(knee>UP_A){
        if(st.wentDeep) c._rep();
        st.phase='up'; st.wentDeep=false;
      }
    }
  });
  c.intro={emoji:'🏋️',title:'스쿼트',desc:'무릎을 깊이 굽혔다 일어나면 자동으로 1회!<br><b>전신이 보이게</b> 서 주세요. 발목이 살짝 가려져도 괜찮아요.'};
  return c;
})();

/* ---------- 팔벌려뛰기 ---------- */
ACT.jacks=(()=>{
  const st={pose:'closed',openAt:0};
  const c=makeCounter({
    key:'jacks',label:'JUMPING JACKS',color:'#a3e635',depth:false,debounce:450,
    reset(){ st.pose='closed'; },
    judge(S,lms){
      // 손목·발목(또는 무릎) 필요
      if(visOf(lms[15])<0.35||visOf(lms[16])<0.35){ setState('양손이 보이게 해 주세요','#fbbf24'); return; }
      const shW=Math.abs(lms[11].x-lms[12].x)*map.vw;
      if(shW<1){ return; }
      const useAnk=visOf(lms[27])>0.25&&visOf(lms[28])>0.25;
      const useKnee=visOf(lms[25])>0.35&&visOf(lms[26])>0.35;
      if(!useAnk&&!useKnee){ setState('다리가 보이게 뒤로 물러나요','#fbbf24'); return; }
      const spread=(useAnk?Math.abs(lms[27].x-lms[28].x):Math.abs(lms[25].x-lms[26].x)*1.25)*map.vw;
      const headY=Math.min(visOf(lms[7])>0.3?lms[7].y:1, visOf(lms[8])>0.3?lms[8].y:1, lms[0]?lms[0].y:1);
      const armsUp  = lms[15].y<headY && lms[16].y<headY;
      const armsDown= lms[15].y>lms[11].y && lms[16].y>lms[12].y;
      const legsOpen  = spread>shW*1.45;
      const legsClosed= spread<shW*1.18;
      if(st.pose==='closed'){
        if(armsUp&&legsOpen){ st.pose='open'; c._rep(); }
        else if(armsUp&&!legsOpen) setState('다리도 벌려요!','#fbbf24');
        else if(!armsUp&&legsOpen) setState('팔을 머리 위로!','#fbbf24');
        else setState('점프하며 팔 위로! 다리 벌려!','#a3e635');
      }else{
        if(armsDown&&legsClosed){ st.pose='closed'; setState('좋아요, 계속!','#22d3ee'); }
        else setState('팔 내리고 다리 모아요','#22d3ee');
      }
    }
  });
  c.intro={emoji:'🤸',title:'팔벌려뛰기',desc:'점프하며 <b>팔을 머리 위로</b> 올리고 <b>다리를 벌리면</b> 1회!<br>내렸다가 다시 올려야 다음 카운트가 돼요.'};
  return c;
})();

/* ---------- 게임 공통: 원 타겟 ---------- */
function drawTarget(x,y,r,col,emoji,label){
  ctx.save();
  ctx.shadowBlur=24; ctx.shadowColor=col;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=col.replace(')',',0.18)').replace('rgb','rgba');
  if(col[0]==='#'){ ctx.fillStyle=hexA(col,0.18); }
  ctx.fill();
  ctx.lineWidth=3.5; ctx.strokeStyle=col; ctx.stroke();
  ctx.shadowBlur=0;
  if(emoji){ ctx.font=Math.round(r*1.15)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emoji,x,y+r*0.06); }
  if(label!=null){ ctx.font='900 '+Math.round(r*0.95)+'px Pretendard'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.shadowColor=col; ctx.fillText(label,x,y+r*0.04); ctx.shadowBlur=0; }
  ctx.restore();
}
function hexA(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function hitAny(pts,x,y,r){ return pts.some(p=>Math.hypot(p.x-x,p.y-y)<r); }
function randPos(r,avoid){
  // 상단 12%~72% 영역(손이 닿는 높이), 가장자리 회피
  for(let t=0;t<40;t++){
    const x=r+20+Math.random()*(map.W-2*(r+20));
    const y=map.H*0.12+r+Math.random()*(map.H*0.60-2*r);
    if(!avoid||avoid.every(a=>Math.hypot(a.x-x,a.y-y)>a.d)) return {x,y};
  }
  return {x:map.W/2,y:map.H*0.3};
}

/* ---------- 두더지 잡기 ---------- */
ACT.mole=(()=>{
  const G={};
  const DUR=60;
  function spawn(){
    const r=Math.max(40,Math.min(map.W,map.H)/8.5);
    const p=randPos(r, G.mole?[{x:G.mole.x,y:G.mole.y,d:r*2.4}]:null);
    G.mole={x:p.x,y:p.y,r,born:performance.now(),life:Math.max(950,1750-G.score*14),lock:true};
  }
  return {
    key:'mole', hud:{counter:true,timer:true,end:true}, _G:G,
    intro:{emoji:'👾',title:'두더지 잡기',desc:'화면에 나타나는 녀석을 <b>손으로 쳐서</b> 잡아요!<br>60초 동안 최대한 많이. 연속으로 잡으면 콤보 보너스!'},
    start(){ G.score=0; G.combo=0; G.maxCombo=0; G.hits=0; G.miss=0; G.mole=null;
      G.endAt=performance.now()+DUR*1000; G.pop=null; G.boom=null;
      $('repNum').textContent='0'; $('repLbl').textContent='SCORE';
      $('timerUnit').textContent='SEC'; spawn(); },
    end(){ this.finish(); },
    finish(){
      const prev=+(best.get('mole')||0);
      if(G.score>prev) best.set('mole',G.score);
      const acc=G.hits+G.miss>0?Math.round(G.hits/(G.hits+G.miss)*100):0;
      showResult({num:G.score,sub:'점! '+(G.score>prev&&G.score>0?'🏆 최고 기록!':''),
        detail:'잡은 두더지 <span class="nb">'+G.hits+'</span>마리 · 놓침 <span class="nb">'+G.miss+'</span>마리<br>'+
               '명중률 <span class="nb">'+acc+'%</span> · 최대 콤보 <span class="nb">'+G.maxCombo+'</span>'});
    },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      let hands=[];
      if(lms){ drawPose(lms,'#fbbf24'); hands=hands2(lms); drawHandGlow(hands); }
      else setState('몸이 보여야 잡을 수 있어요!','#fbbf24');
      if(G.mole){
        const m=G.mole, age=now-m.born;
        if(age>m.life){ G.miss++; G.combo=0; setState('놓쳤다! 다음 두더지!','#fb7185'); beep(220,0.15); spawn(); }
        else{
          const k=Math.min(1,age/160);                       // 팝인 애니메이션
          const wob=1+Math.sin(age/110)*0.08;                // 두근두근 펄스(역동)
          drawTarget(m.x,m.y,m.r*k*wob,'#fbbf24','👾');
          // 남은시간 링
          ctx.beginPath(); ctx.arc(m.x,m.y,m.r*k+7,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-age/m.life));
          ctx.strokeStyle='#fde68a'; ctx.lineWidth=3; ctx.stroke();
          if(hands.length){
            const near=anyNear(hands,m.x,m.y,m.r+16);
            if(m.lock){ if(!near) m.lock=false; }            // 스폰 시 손이 위에 있으면 한 번 빼야 인정
            else if(anySegHit(hands,m.x,m.y,m.r+16)){        // 선분 판정: 빠른 손도 놓치지 않음
              G.hits++; G.combo++; G.maxCombo=Math.max(G.maxCombo,G.combo);
              const gain=10+Math.min(10,(G.combo-1)*2);
              G.score+=gain;
              $('repNum').textContent=G.score;
              const n=$('repNum'); n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
              G.pop={x:m.x,y:m.y,t:now,txt:'+'+gain+(G.combo>=3?' 🔥x'+G.combo:'')};
              G.boom={x:m.x,y:m.y,t:now};
              setState(G.combo>=3?G.combo+'콤보! 🔥':'잡았다!','#a3e635');
              beep(660+Math.min(400,G.combo*40),0.1); buzz(40);
              spawn();
            }
          }
        }
      }
      if(G.boom&&now-G.boom.t<450){
        const ba=1-(now-G.boom.t)/450;
        ctx.save(); ctx.globalAlpha=ba;
        ctx.font=Math.round(50+(1-ba)*70)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('💥',G.boom.x,G.boom.y);
        ctx.restore();
      }
      if(G.pop&&now-G.pop.t<600){
        const a=1-(now-G.pop.t)/600;
        ctx.font='900 '+Math.max(20,map.W/14)+'px Pretendard'; ctx.textAlign='center';
        ctx.fillStyle='rgba(253,230,138,'+a+')';
        ctx.fillText(G.pop.txt,G.pop.x,G.pop.y-(1-a)*60);
      }
    }
  };
})();

/* ---------- 반응속도 (60초 연속) ---------- */
ACT.reaction=(()=>{
  const G={};
  const DUR=60;
  function grade(ms){
    if(ms<420) return '⚡ 번개급!';
    if(ms<560) return '🐆 치타급!';
    if(ms<720) return '🐇 토끼급!';
    if(ms<950) return '🐶 강아지급';
    return '🐢 거북이… 다시 도전!';
  }
  return {
    key:'reaction', hud:{counter:true,timer:true,end:true}, _G:G,
    grade,
    intro:{emoji:'⚡',title:'반응속도 60초',desc:'<b>원이 번쩍</b> 나타나면 <b>손으로 최대한 빨리</b> 터치!<br><b>60초</b> 동안 쉬지 않고 계속돼요. 몇 개나 잡을 수 있을까요?'},
    start(){ G.score=0; G.times=[]; G.state='wait'; G.nextAt=performance.now()+900; G.target=null;
      G.endAt=performance.now()+DUR*1000;
      $('repNum').textContent='0'; $('repLbl').textContent='HITS'; $('timerUnit').textContent='SEC'; },
    end(){ this.finish(); },
    finish(){
      const avg=G.times.length?Math.round(G.times.reduce((a,b)=>a+b,0)/G.times.length):0;
      const fast=G.times.length?Math.min(...G.times):0;
      const prev=+(best.get('reaction2')||0);
      if(G.score>prev) best.set('reaction2',G.score);
      showResult({num:G.score,sub:'개 잡았어요!'+(G.score>prev&&G.score>0?' 🏆 기록 경신!':''),
        detail:G.times.length?('평균 반응 <span class="nb">'+avg+'ms</span> · 최고 <span class="nb">'+fast+'ms</span><br>'+grade(avg)):''});
    },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      let hands=[];
      if(lms){ drawPose(lms,'#fb7185'); hands=hands2(lms); drawHandGlow(hands,'#fb7185'); }
      else setState('몸이 보이게 서 주세요','#fbbf24');
      if(G.state==='wait'){
        if(now>=G.nextAt){
          const r=Math.max(42,Math.min(map.W,map.H)/8);
          // 현재 손 위치에서 충분히 먼 곳에 스폰
          const avoid=hands.map(h=>({x:h.x,y:h.y,d:Math.min(map.W,map.H)*0.3}));
          const p=randPos(r,avoid);
          G.target={x:p.x,y:p.y,r,shown:now};
          G.state='go'; beep(1040,0.08,0.3);
        }
      }else if(G.state==='go'&&G.target){
        const t=G.target;
        if(now-t.shown>2500){ G.state='wait'; G.nextAt=now+300; G.target=null; return; } // 못 치면 위치 이동
        drawTarget(t.x,t.y,t.r,'#fb7185',null,'!');
        if(hands.length&&anySegHit(hands,t.x,t.y,t.r+16)){
          const ms=Math.round(now-t.shown);
          G.times.push(ms); G.score++;
          $('repNum').textContent=G.score;
          const n=$('repNum'); n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
          beep(660,0.1); buzz(40);
          setState(ms+'ms! '+grade(ms),'#a3e635');
          G.state='wait'; G.nextAt=now+350+Math.random()*900; G.target=null;
        }
      }
    }
  };
})();

/* ---------- 넘버 헌터 (1→2→3→4, 60초 연속 세트) ---------- */
ACT.sequence=(()=>{
  const G={};
  const DUR=60, N=4;
  function layout(){
    const r=Math.max(40,Math.min(map.W,map.H)/9);
    const pts=[];
    for(let i=0;i<N;i++){
      const p=randPos(r,pts.map(q=>({x:q.x,y:q.y,d:r*2.7})));

    }

  }
  return {

    },

      // 날아가는 휴지 파티클

        const al=age>2300?1-(age-2300)/900:1;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.globalAlpha=0.92*al;
        ctx.fillStyle='#f8fafc'; ctx.shadowBlur=8; ctx.shadowColor='rgba(255,255,255,.55)';
        rrCtx(-26,-34,52,68,9); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=0.45*al; ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(-17,-13); ctx.lineTo(17,-9); ctx.stroke();
        ctx.restore();
        return true;
      });
      // 휴지곽 + 뽑기존
      const bw=Math.min(map.W*0.42,230), bh=bw*0.45;

      ctx.beginPath(); ctx.arc(bx,zy,zr,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.shadowBlur=14; ctx.shadowColor='rgba(240,171,252,.5)';
      ctx.fillStyle='#6d28d9'; rrCtx(bx-bw/2,by-bh/2,bw,bh,16); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#4c1d95'; rrCtx(bx-bw*0.32,by-bh/2-6,bw*0.64,14,7); ctx.fill();
      const fl=Math.sin(now/240)*5;
      ctx.fillStyle='#f8fafc';
      ctx.beginPath(); ctx.moveTo(bx-20,by-bh/2+2);
      ctx.quadraticCurveTo(bx+fl,by-bh/2-36,bx+20,by-bh/2+2);
      ctx.closePath(); ctx.fill();
      ctx.font='900 '+Math.round(bh*0.3)+'px Pretendard'; ctx.textAlign='center'; ctx.fillStyle='#e9d5ff';
      ctx.fillText('TISSUE',bx,by+bh*0.2);
      ctx.restore();
      // 뽑기 판정: 존을 위로 빠르게 통과
      hands.forEach(h=>{
        if(now-G.lastPull<250) return;
        if(h.vy<-520&&segHit(h,bx,zy,zr)){
          G.lastPull=now; G.n++;
          const n=$('repNum'); n.textContent=G.n;
          n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
          G.parts.push({x:bx,y:zy,vx:h.vx*0.4,vy:Math.max(-900,h.vy*0.4),rot:0,vr:(Math.random()-0.5)*6,t:now});
          if(G.parts.length>28) G.parts.shift();
          beep(820+Math.random()*260,0.07); buzz(22);
          setState(['촥!','쓱!','휙~','한 장 더!'][G.n%4],'#f0abfc');
        }
      });
    }
  };
})();

/* ---------- 뚝딱 망치 (60초) ---------- */
ACT.hammer=(()=>{
  const G={};
  const DUR=60, HITS=3;
  function newNail(avoid){
    const r=Math.max(30,Math.min(map.W,map.H)/11);
    const p=randPos(r*1.3,avoid);
    return {x:p.x,y:Math.min(Math.max(p.y,map.H*0.28),map.H*0.62),r,depth:0,last:0,sparks:[]};
  }
  return {
    key:'hammer', hud:{counter:true,timer:true,end:true}, _G:G,
    intro:{emoji:'🔨',title:'뚝딱 망치질',desc:'못 머리 위로 손을 <b>위에서 아래로 휙!</b> 내리치면 못이 박혀요.<br>세 번 치면 완성 — <b>60초</b> 동안 몇 개나 박을까요?'},
    start(){ G.n=0; G.endAt=performance.now()+DUR*1000;
      const a=newNail(null);
      G.nails=[a,newNail([{x:a.x,y:a.y,d:a.r*3.4}])];
      $('repNum').textContent='0'; $('repLbl').textContent='NAILS'; $('timerUnit').textContent='SEC'; },
    end(){ this.finish(); },
    finish(){
      const prev=+(best.get('hammer')||0); if(G.n>prev) best.set('hammer',G.n);
      showResult({num:G.n,sub:'개 박았어요!'+(G.n>prev&&G.n>0?' 🏆 기록 경신!':''),
        detail:G.n>=12?'목수 달인! 🔨':G.n>=7?'뚝딱뚝딱 잘하는데요!':'팔을 크게 위에서 아래로!'});
    },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      let hands=[];
      if(lms){ drawPose(lms,'#eab308'); hands=hands2(lms); drawHandGlow(hands,'#eab308'); }
      else setState('몸이 보이게 서 주세요','#fbbf24');
      G.nails.forEach(nl=>{
        const L=nl.r*2.1, sink=nl.depth/HITS;
        const headY=nl.y-L*(1-sink);
        // 나무토막
        ctx.fillStyle='#8a5a2b'; rrCtx(nl.x-nl.r*1.5,nl.y,nl.r*3,nl.r*0.85,8); ctx.fill();
        ctx.fillStyle='#6f4620'; rrCtx(nl.x-nl.r*1.5,nl.y,nl.r*3,9,8); ctx.fill();
        // 못
        ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=7; ctx.shadowBlur=6; ctx.shadowColor='#94a3b8';
        ctx.beginPath(); ctx.moveTo(nl.x,headY); ctx.lineTo(nl.x,nl.y+5); ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle='#e2e8f0';
        ctx.beginPath(); ctx.ellipse(nl.x,headY,nl.r*0.58,nl.r*0.22,0,0,Math.PI*2); ctx.fill();
        // 타격존 힌트 + 진행 점
        ctx.save(); ctx.setLineDash([7,7]); ctx.strokeStyle='rgba(234,179,8,.4)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(nl.x,headY,nl.r*0.9+14,0,Math.PI*2); ctx.stroke(); ctx.restore();
        for(let i=0;i<HITS;i++){ ctx.beginPath(); ctx.arc(nl.x-16+i*16,nl.y+nl.r*1.3,4.5,0,Math.PI*2);
          ctx.fillStyle=i<nl.depth?'#a3e635':'rgba(148,163,184,.4)'; ctx.fill(); }
        // 판정: 아래로 빠르게 내려치는 손이 못 머리 통과
        if(hands.length&&now-nl.last>270){
          if(hands.some(h=>h.vy>600&&segHit(h,nl.x,headY,nl.r*0.9+16))){
            nl.last=now; nl.depth++;
            nl.sparks=Array.from({length:7},()=>({a:Math.random()*6.28,v:130+Math.random()*260,t:now}));
            beep(280+nl.depth*150,0.09,0.3); buzz(38);
            if(nl.depth>=HITS){
              G.n++;
              const n=$('repNum'); n.textContent=G.n;
              n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
              setState('뚝딱! 완성 🔨','#a3e635'); beep(880,0.15);
              const others=G.nails.filter(o=>o!==nl).map(o=>({x:o.x,y:o.y,d:o.r*3.4}));
              Object.assign(nl,newNail(others));
            }else setState(['땅!','땅땅!'][nl.depth-1]||'땅!','#fbbf24');
          }
        }
        nl.sparks=nl.sparks.filter(s=>{
          const age=now-s.t; if(age>320) return false;
          const d=s.v*age/1000, al=1-age/320;
          ctx.strokeStyle='rgba(253,224,71,'+al+')'; ctx.lineWidth=3;
          ctx.beginPath(); ctx.moveTo(nl.x+Math.cos(s.a)*d*0.4,headY+Math.sin(s.a)*d*0.4);
          ctx.lineTo(nl.x+Math.cos(s.a)*d,headY+Math.sin(s.a)*d); ctx.stroke();
          return true;
        });
      });
    }
  };
})();

        it.vy+=it.g*dt/1000; it.x+=it.vx*dt/1000; it.y+=it.vy*dt/1000; it.rot+=it.vr*dt/1000;
        if(it.y>map.H+90) return false;
        ctx.save(); ctx.translate(it.x,it.y); ctx.rotate(it.rot);
        ctx.font=Math.round(it.r*1.7)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        if(it.bomb){ ctx.shadowBlur=18; ctx.shadowColor='#fb7185'; }
        else{ ctx.shadowBlur=12; ctx.shadowColor='rgba(0,0,0,.45)'; }
        ctx.fillText(it.e,0,0); ctx.restore();
        // 베기: 손 속도 800px/s 이상의 스윙이 통과해야 인정
        const hh=hands.length?hands.find(h=>h.spd>800&&segHit(h,it.x,it.y,it.r+14)):null;
        if(hh){
          // 검격 궤적: 실제 스윙 방향으로 슬래시가 번쩍
          const ang=Math.atan2(hh.y-hh.py,hh.x-hh.px);
          G.slash={x1:it.x-Math.cos(ang)*it.r*2.4, y1:it.y-Math.sin(ang)*it.r*2.4,
                   x2:it.x+Math.cos(ang)*it.r*2.4, y2:it.y+Math.sin(ang)*it.r*2.4, t:now};
          if(it.bomb){
            G.boomN++; G.score=Math.max(0,G.score-20); G.flash=now;
            beep(150,0.25,0.35); buzz([0,90,60,90]);
            setState('💣 폭탄! -20점','#fb7185');
          }else{
            G.cut++; G.score+=10;
            // 스윙 방향 절단선을 따라 반쪽 두 개가 수직 방향으로 벌어지며 낙하
            const perp=ang+Math.PI/2;
            [-1,1].forEach(s=>G.fx.push({x:it.x,y:it.y,
              vx:it.vx*0.3+Math.cos(perp)*s*180, vy:it.vy*0.2+Math.sin(perp)*s*180-110,
              e:it.e,r:it.r,rot:it.rot,vr:s*3,slashAng:ang,side:s,t:now,kind:'half'}));
            for(let i=0;i<8;i++) G.fx.push({x:it.x,y:it.y,a:perp+(Math.random()-0.5)*1.4+(Math.random()<0.5?Math.PI:0),v:150+Math.random()*260,col:JUICE[it.e]||'#4ade80',t:now,kind:'juice'});
            beep(860+Math.random()*260,0.07); buzz(24);
            setState(['싹둑!','슉!','나이스 컷!'][G.cut%3],'#4ade80');
          }
          const n=$('repNum'); n.textContent=G.score;
          n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
          return false;
        }
        return true;
      });
      // 검격(슬래시) 번쩍 — 잘린 방향 그대로
      if(G.slash&&now-G.slash.t<240){
        const al=1-(now-G.slash.t)/240;
        ctx.save();
        ctx.strokeStyle='rgba(255,255,255,'+al.toFixed(3)+')'; ctx.lineWidth=1.5+5*al;
        ctx.shadowBlur=20; ctx.shadowColor='#fff'; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(G.slash.x1,G.slash.y1); ctx.lineTo(G.slash.x2,G.slash.y2); ctx.stroke();
        ctx.strokeStyle='rgba(163,230,53,'+(al*0.7).toFixed(3)+')'; ctx.lineWidth=1+2*al;
        ctx.stroke();
        ctx.restore();
      }
      G.fx=G.fx.filter(p=>{
        const age=now-p.t;
        if(p.kind==='half'){
          if(age>750) return false;
          p.vy+=map.H*1.2*dt/1000; p.x+=p.vx*dt/1000; p.y+=p.vy*dt/1000; p.rot+=p.vr*dt/1000;
          // 절단선 기준 반쪽만 클리핑해 그리기 — 실제로 두 동강 난 것처럼 보임
          ctx.save(); ctx.globalAlpha=1-age/750;
          ctx.translate(p.x,p.y); ctx.rotate(p.slashAng);
          ctx.beginPath(); ctx.rect(-p.r*2.2, p.side<0?-p.r*2.2:0, p.r*4.4, p.r*2.2); ctx.clip();
          ctx.rotate(p.rot-p.slashAng);
          ctx.font=Math.round(p.r*1.7)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(p.e,0,0); ctx.restore();
          return true;
        }
        if(age>420) return false;
        const d=p.v*age/1000, al=1-age/420;
        ctx.fillStyle=hexA(p.col||'#4ade80',al);
        ctx.beginPath(); ctx.arc(p.x+Math.cos(p.a)*d,p.y+Math.sin(p.a)*d,4,0,Math.PI*2); ctx.fill();
        return true;
      });
      if(G.flash&&now-G.flash<350){
        ctx.fillStyle='rgba(251,113,133,'+(0.35*(1-(now-G.flash)/350)).toFixed(3)+')';
        ctx.fillRect(0,0,map.W,map.H);
      }
    }
  };
})();

/* ---------- 구름 계단 오르기 (제자리 점프, 60초) ---------- */
ACT.cloud=(()=>{
  const G={};
  const DUR=60;
  // 고도별 하늘 색·구역 이름 — 올라갈수록 하늘→우주로
  const SKY=[[0,'#38bdf8'],[8,'#0ea5e9'],[16,'#2563eb'],[24,'#1e3a8a'],[34,'#312e81'],[46,'#0b1030']];
  const ZONES=[[0,'운동장'],[5,'지붕 위'],[10,'산꼭대기'],[15,'구름 속'],[20,'비행기 높이'],[30,'성층권'],[40,'우주 정거장'],[55,'달나라'],[75,'은하수']];
  const MILES={5:'🕊️',10:'🌈',15:'✈️',20:'🎈',30:'🛰️',40:'🌙',55:'🚀',75:'⭐'};
  function lerpC(c1,c2,t){
    const a=parseInt(c1.slice(1),16), b=parseInt(c2.slice(1),16);
    const r=((a>>16)&255)+(((b>>16)&255)-((a>>16)&255))*t;
    const g2=((a>>8)&255)+(((b>>8)&255)-((a>>8)&255))*t;
    const bl=(a&255)+((b&255)-(a&255))*t;
    return 'rgba('+Math.round(r)+','+Math.round(g2)+','+Math.round(bl)+',';
  }
  function skyCol(steps){
    for(let i=SKY.length-1;i>0;i--){
      if(steps>=SKY[i-1][0]){
        const lo=SKY[i-1], hi=SKY[Math.min(i,SKY.length-1)];
        const t=Math.min(1,(steps-lo[0])/Math.max(1,(hi[0]-lo[0])));
        return lerpC(lo[1],hi[1],steps>=SKY[SKY.length-1][0]?1:t);
      }
    }
    return lerpC(SKY[0][1],SKY[1][1],0);
  }
  function zoneName(steps){
    let z=ZONES[0][1];
    ZONES.forEach(zz=>{ if(steps>=zz[0]) z=zz[1]; });
    return z;
  }
  function drawCloudShape(x,y,s,al){
    ctx.save(); ctx.globalAlpha=al;
    ctx.fillStyle='#fff'; ctx.shadowBlur=16; ctx.shadowColor='rgba(255,255,255,.7)';
    [[0,0,1],[-0.62,0.14,0.72],[0.62,0.14,0.72],[-0.3,-0.26,0.64],[0.3,-0.26,0.64]].forEach(c=>{
      ctx.beginPath(); ctx.arc(x+c[0]*s,y+c[1]*s,s*c[2]*0.5,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }
  return {
    key:'cloud', hud:{counter:true,timer:true,end:true}, _G:G,
    intro:{emoji:'☁️',title:'구름 계단 오르기',desc:'<b>제자리에서 폴짝 점프!</b>하면 구름 한 계단을 올라가요.<br>지붕 위 → 산꼭대기 → 비행기 → 우주까지…<br>60초 동안 몇 계단이나 올라갈까요?'},
    start(){ G.steps=0; G.endAt=performance.now()+DUR*1000; G.pt=0;
      G.base=null; G.state='ground'; G.airStart=0; G.lost=0;
      G.scroll=0; G.scrollT=0; G.puffs=[]; G.deco=[]; G.mile=null; G.zone='운동장';
      for(let i=0;i<5;i++) G.deco.push({x:Math.random(),y:Math.random(),s:26+Math.random()*30,sp:4+Math.random()*8});
      $('repNum').textContent='0'; $('repLbl').textContent='STEPS'; $('timerUnit').textContent='SEC'; },
    end(){ this.finish(); },
    finish(){
      const prev=+(best.get('cloud')||0); if(G.steps>prev) best.set('cloud',G.steps);
      showResult({num:G.steps,sub:'계단 올랐어요! ☁️'+(G.steps>prev&&G.steps>0?' 🏆 기록 경신!':''),
        detail:'최종 도착지 <span class="nb">'+zoneName(G.steps)+'</span>'
          +(G.steps>=40?'<br>우주 점퍼! 🚀':G.steps>=20?'<br>구름 위 산책 성공!':'')});
    },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      const dt=Math.min(50,now-(G.pt||now)); G.pt=now;
      // 하늘 틴트(고도에 따라 변화) — 카메라가 비치도록 반투명
      const sc=skyCol(G.steps+ (G.state==='air'?0.5:0));
      ctx.fillStyle=sc+'0.32)'; ctx.fillRect(0,0,map.W,map.H);
      // 우주 근처에선 별
      if(G.steps>=28){
        const starAl=Math.min(0.9,(G.steps-28)/18);
        for(let i=0;i<24;i++){
          const sx=(i*137.5)%map.W, sy=((i*89.3)%(map.H*0.6));
          const tw=0.4+0.6*Math.abs(Math.sin(now/700+i));
          ctx.fillStyle='rgba(255,255,255,'+(starAl*tw).toFixed(2)+')';
          ctx.fillRect(sx,sy,2.2,2.2);
        }
      }
      // 스크롤 애니메이션(점프 시 구름이 아래로 흘러 올라가는 느낌)
      if(G.scrollT>0){ G.scrollT=Math.max(0,G.scrollT-dt); }
      const ease=G.scrollT/300;
      // 배경 장식 구름(패럴랙스)
      G.deco.forEach(d=>{
        d.y+= (d.sp+ease*220)*dt/1000/map.H;
        if(d.y>1.15){ d.y=-0.15; d.x=Math.random(); }
        drawCloudShape(d.x*map.W, d.y*map.H, d.s, 0.35);
      });
      let hip=null, torso=100;
      if(lms){
        drawPose(lms,'#7dd3fc');
        const h1=toPx(lms[23]), h2=toPx(lms[24]), s1=toPx(lms[11]), s2=toPx(lms[12]);
        hip={x:(h1.x+h2.x)/2, y:(h1.y+h2.y)/2};
        torso=Math.max(60,Math.hypot((s1.x+s2.x)/2-hip.x,(s1.y+s2.y)/2-hip.y));
        G.lost=0;
      }else{
        G.lost++;
        if(G.lost>45){ G.base=null; G.state='ground'; }
        setState('전신이 보이게 서 주세요','#fbbf24');
      }
      // 발밑 구름 플랫폼(플레이어 아래)
      if(hip){
        const footY=Math.min(map.H-40, hip.y+torso*1.55+ease*40);
        drawCloudShape(hip.x, footY, Math.max(60,torso*0.85), 0.92);
      }
      // 점프 판정: 골반 중심이 기준선보다 몸통비례 임계 이상 상승→공중, 복귀→착지(+1계단)
      if(hip){
        if(G.base==null) G.base=hip.y;
        const thresh=Math.max(26,torso*0.28);
        const rise=G.base-hip.y;
        if(G.state==='ground'){
          G.base=G.base*0.97+hip.y*0.03;      // 서 있는 동안 기준선 서서히 보정
          if(rise>thresh){ G.state='air'; G.airStart=now; }
          else setState(G.steps===0?'폴짝! 점프해서 구름을 올라요 ☁️':(zoneName(G.steps)+' · '+G.steps+'계단'),'#7dd3fc');
        }else{
          setState('점프! ⬆️','#a3e635');
          if(rise<thresh*0.35){
            if(now-G.airStart>110){
              G.steps++;
              const n=$('repNum'); n.textContent=G.steps;
              n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
              G.scrollT=300;
              for(let i=0;i<8;i++) G.puffs.push({x:hip.x+(Math.random()-0.5)*torso,y:hip.y+torso*1.4,
                a:Math.PI+(Math.random()-0.5)*1.6,v:90+Math.random()*160,t:now});
              beep(Math.min(1400,480+G.steps*14),0.09); buzz(28);
              const z=zoneName(G.steps);
              if(z!==G.zone){ G.zone=z; setState('🎉 '+z+' 도착!','#fbbf24'); beep(1100,0.16); }
              if(MILES[G.steps]) G.mile={e:MILES[G.steps],x:map.W*(Math.random()<0.5?0.18:0.82),y:-40,t:now};
            }
            G.state='ground';
          }
        }
      }
      // 착지 퍼프
      G.puffs=G.puffs.filter(p=>{
        const age=now-p.t; if(age>500) return false;
        const d=p.v*age/1000, al=1-age/500;
        ctx.fillStyle='rgba(255,255,255,'+(al*0.8).toFixed(2)+')';
        ctx.beginPath(); ctx.arc(p.x+Math.cos(p.a)*d,p.y+Math.sin(p.a)*d*0.4,7*al+2,0,Math.PI*2); ctx.fill();
        return true;
      });
      // 마일스톤(구역 도달 이모지가 옆에서 두둥실 지나감)
      if(G.mile){
        const age=now-G.mile.t;
        if(age>2600) G.mile=null;
        else{
          const my=age/2600*(map.H+120)-60;
          ctx.save(); ctx.font=Math.max(40,Math.min(map.W,map.H)/9)+'px sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.shadowBlur=16; ctx.shadowColor='#fff';
          ctx.fillText(G.mile.e,G.mile.x,my); ctx.restore();
        }
      }
      // 상단 고도 라벨
      ctx.save();
      ctx.font='800 '+Math.max(13,map.W/26)+'px Pretendard'; ctx.textAlign='center';
      ctx.fillStyle='rgba(255,255,255,.92)'; ctx.shadowBlur=10; ctx.shadowColor='rgba(125,211,252,.8)';
      ctx.fillText('☁️ '+zoneName(G.steps)+' · '+G.steps+'계단',map.W/2,Math.max(64,map.H*0.09));
      ctx.restore();
    }
  };
})();

/* ---------- 모기 잡기 (박수, 60초) ---------- */
ACT.mosquito=(()=>{
  const G={};
  const DUR=60;
  return {
    key:'mosquito', hud:{counter:true,timer:true,end:true}, _G:G,
    intro:{emoji:'🦟',title:'모기 잡기',desc:'앵~ 모기가 요리조리 날아다녀요.<br><b>모기 근처에서 두 손을 짝!</b> 마주치면(박수) 잡혀요.<br>60초 동안 몇 마리나 잡을까요?'},
    start(){ G.n=0; G.claps=0; G.endAt=performance.now()+DUR*1000; G.pt=0;
      G.mq=null; G.respawnAt=0; G.lastClap=0; G.prevGap=null; G.boom=null; G.buzzAt=0; G.trail=[];
      $('repNum').textContent='0'; $('repLbl').textContent='CATCH'; $('timerUnit').textContent='SEC'; },
    end(){ this.finish(); },
    finish(){
      const prev=+(best.get('mosquito')||0); if(G.n>prev) best.set('mosquito',G.n);
      const acc=G.claps?Math.round(G.n/G.claps*100):0;
      showResult({num:G.n,sub:'마리 잡았어요!'+(G.n>prev&&G.n>0?' 🏆 기록 경신!':''),
        detail:'박수 <span class="nb">'+G.claps+'</span>번 · 명중률 <span class="nb">'+acc+'%</span>'
          +(G.n>=20?'<br>모기 헌터 등극! 🦟💥':'')});
    },
    _spawn(){
      const m2=Math.min(map.W,map.H);
      G.mq={x:50+Math.random()*(map.W-100), y:map.H*0.12+Math.random()*map.H*0.45,
        tx:map.W/2,ty:map.H*0.3,retarget:0,spd:m2*(0.35+Math.random()*0.2)};
    },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      const el=DUR-remain;
      const dt=Math.min(50,now-(G.pt||now)); G.pt=now;
      let hands=[];
      if(lms){ drawPose(lms,'#a3e635'); hands=hands2(lms); drawHandGlow(hands,'#a3e635'); }
      else setState('몸이 보이게 서 주세요','#fbbf24');
      if(!G.mq&&now>=G.respawnAt) this._spawn();
      if(G.mq){
        const q=G.mq;
        // 목표 지점을 계속 갈아끼우며 요리조리 비행
        if(now>=q.retarget){
          q.tx=50+Math.random()*(map.W-100);
          q.ty=map.H*0.10+Math.random()*map.H*0.5;
          q.retarget=now+450+Math.random()*700;
        }
        const dx=q.tx-q.x, dy=q.ty-q.y, dd=Math.hypot(dx,dy)||1;
        const sp=q.spd*(1+el*0.012);
        q.x+=dx/dd*sp*dt/1000+Math.sin(now/85)*1.7;
        q.y+=dy/dd*sp*dt/1000+Math.cos(now/105)*1.7;
        // 잔상 트레일 — 비행 궤적이 살아있게
        G.trail.push({x:q.x,y:q.y,t:now});
        while(G.trail.length&&now-G.trail[0].t>380) G.trail.shift();
        G.trail.forEach(tr=>{
          const a2=1-(now-tr.t)/380;
          ctx.fillStyle='rgba(163,230,53,'+(a2*0.30).toFixed(2)+')';
          ctx.beginPath(); ctx.arc(tr.x,tr.y,5*a2+1.5,0,Math.PI*2); ctx.fill();
        });
        // 웅웅~ 파동 링
        const pr=(now%900)/900;
        ctx.strokeStyle='rgba(163,230,53,'+(0.5*(1-pr)).toFixed(2)+')'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(q.x,q.y,18+pr*38,0,Math.PI*2); ctx.stroke();
        ctx.save(); ctx.translate(q.x,q.y);
        ctx.rotate(Math.sin(now/110)*0.28);
        ctx.font=Math.max(30,Math.min(map.W,map.H)/11)+'px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowBlur=10; ctx.shadowColor='#a3e635';
        ctx.fillText('🦟',0,0); ctx.restore();
        if(now>=G.buzzAt){ beep(880+Math.random()*350,0.045,0.06); G.buzzAt=now+140+Math.random()*260; }
        // 박수 판정: 두 손이 빠르게 모임(닫히는 속도) + 손 중점이 모기 근처
        if(hands.length===2){
          const gap=Math.hypot(hands[0].x-hands[1].x,hands[0].y-hands[1].y);
          const m2=Math.min(map.W,map.H);
          if(G.prevGap!=null){
            const closing=(G.prevGap-gap)/Math.max(16,dt)*1000;   // px/s
            if(gap<m2/6&&closing>m2*0.9&&now-G.lastClap>420){
              G.lastClap=now; G.claps++;
              const mx=(hands[0].x+hands[1].x)/2, my=(hands[0].y+hands[1].y)/2;
              if(Math.hypot(mx-q.x,my-q.y)<m2/4.5){
                G.n++;
                const n=$('repNum'); n.textContent=G.n;
                n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
                G.boom={x:q.x,y:q.y,t:now};
                beep(1050,0.08); buzz(40);
                setState(['짝! 잡았다!','명중! 🦟💥','박수 원샷!'][G.n%3],'#a3e635');
                G.mq=null; G.respawnAt=now+450;
              }else{
                beep(300,0.07); setState('헛박수! 모기 가까이에서 짝!','#fbbf24');
              }
            }
          }
          G.prevGap=gap;
        } else G.prevGap=null;
      }
      if(G.boom&&now-G.boom.t<420){
        const ba=1-(now-G.boom.t)/420;
        ctx.save(); ctx.globalAlpha=ba;
        ctx.font=Math.round(44+(1-ba)*50)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('💥',G.boom.x,G.boom.y); ctx.restore();
      }
    }
  };
})();

/* ---------- 칠판 지우기 (타임어택) ---------- */
ACT.board=(()=>{
  const G={};
  const CELL=42;
  function scribble(g,W,H){
    const M={x:W*0.07,y:H*0.10,w:W*0.86,h:H*0.66};
    const cols=['rgba(255,255,255,.85)','rgba(253,224,71,.8)','rgba(244,114,182,.75)','rgba(147,197,253,.8)'];
    g.lineCap='round';
    for(let i=0;i<26;i++){          // 마구 그은 낙서 선
      g.strokeStyle=cols[i%cols.length];
      g.lineWidth=6+Math.random()*9;
      g.beginPath();
      let x=M.x+Math.random()*M.w, y=M.y+Math.random()*M.h;
      g.moveTo(x,y);
      const segs=3+(Math.random()*4|0);
      for(let s2=0;s2<segs;s2++){
        const nx=Math.max(M.x,Math.min(M.x+M.w,x+(Math.random()-0.5)*W*0.45));
        const ny=Math.max(M.y,Math.min(M.y+M.h,y+(Math.random()-0.5)*H*0.3));
        g.quadraticCurveTo((x+nx)/2+(Math.random()-0.5)*60,(y+ny)/2+(Math.random()-0.5)*60,nx,ny);
        x=nx; y=ny;
      }
      g.stroke();
    }
    for(let i=0;i<8;i++){           // 동그라미 낙서
      g.strokeStyle=cols[(Math.random()*cols.length)|0];
      g.lineWidth=5+Math.random()*6;
      g.beginPath();
      g.ellipse(M.x+Math.random()*M.w,M.y+Math.random()*M.h,20+Math.random()*46,14+Math.random()*30,Math.random()*3,0,Math.PI*2);
      g.stroke();
    }
    return M;
  }
  const ROUNDS=3;
  return {
    key:'board', hud:{counter:true,timer:true,end:true}, _G:G,
    intro:{emoji:'🧽',title:'칠판 지우기',desc:'앗, 칠판이 낙서로 엉망!<br><b>손바닥을 크게 휘저어</b> 낙서를 싹싹 지워요.<br><b>3판 연속</b> — 합산 시간 타임어택! ⏱'},
    _newBoard(){
      G.bc=document.createElement('canvas'); G.bc.width=map.W; G.bc.height=map.H;
      G.bg=G.bc.getContext('2d');
      const M=scribble(G.bg,map.W,map.H);
      G.cells=[];
      const cols=Math.ceil(map.W/CELL), rows=Math.ceil(map.H/CELL);
      for(let r2=0;r2<rows;r2++) for(let c2=0;c2<cols;c2++){
        const cx2=c2*CELL+CELL/2, cy2=r2*CELL+CELL/2;
        if(cx2>M.x&&cx2<M.x+M.w&&cy2>M.y&&cy2<M.y+M.h) G.cells.push({x:cx2,y:cy2,clean:false});
      }
      G.total=G.cells.length; G.cleanN=0;
      $('repLbl').textContent='R'+G.round+'/'+ROUNDS+' · %';
      $('repNum').textContent='0';
    },
    start(){
      G.t0=performance.now(); G.done=false; G.round=1; G.betweenUntil=0;
      this._newBoard();
      $('timerUnit').textContent='SEC';
    },
    end(){ this.finish(true); },
    finish(dnf){
      if(G.done) return; G.done=true;
      const sec=(performance.now()-G.t0)/1000;
      const pct=G.total?Math.round(G.cleanN/G.total*100):0;
      if(!dnf){
        const prev=+(best.get('board')||99999);
        if(sec<prev) best.set('board',sec.toFixed(1));
        showResult({num:sec.toFixed(1),sub:'초에 3판 클리어! 🧽'+(sec<prev?' 🏆 기록 경신!':''),
          detail:sec<55?'번개 지우개! ⚡':sec<85?'선생님이 좋아하시겠어요!':'다음엔 팔을 더 크게 휘둘러요!'});
      }else{
        showResult({num:G.round,sub:'판째 도전 중이었어요',detail:'3판을 모두 지우면 기록이 남아요! (현재 판 '+pct+'%)'});
      }
    },
    frame(lms){
      const now=performance.now();
      if(G.done) return;
      const sec=(now-G.t0)/1000;
      $('timerVal').textContent=sec.toFixed(1);
      // 판 사이 전환 연출
      if(G.betweenUntil>now){
        if(lms) drawPose(lms,'#4ade80');
        ctx.fillStyle='rgba(16,64,43,.42)'; ctx.fillRect(0,0,map.W,map.H);
        ctx.save();
        ctx.font='900 '+Math.max(22,map.W/12)+'px Pretendard'; ctx.textAlign='center';
        ctx.fillStyle='#fff'; ctx.shadowBlur=16; ctx.shadowColor='#4ade80';
        ctx.fillText(G.round+'번째 칠판!',map.W/2,map.H*0.42);
        ctx.font='700 '+Math.max(14,map.W/26)+'px Pretendard';
        ctx.fillText('또 낙서가?! 준비…',map.W/2,map.H*0.42+Math.max(30,map.W/12));
        ctx.restore();
        return;
      }
      let hands=[];
      if(lms){ drawPose(lms,'#4ade80'); hands=hands2(lms); }
      else setState('몸이 보이게 서 주세요','#fbbf24');
      const R=Math.max(44,Math.min(map.W,map.H)/8);
      // 손 경로를 따라 지우기(오프스크린 캔버스에 destination-out)
      if(hands.length){
        G.bg.save(); G.bg.globalCompositeOperation='destination-out';
        G.bg.fillStyle='#000';
        hands.forEach(h=>{
          const steps=Math.max(1,Math.ceil(Math.hypot(h.x-h.px,h.y-h.py)/(R*0.5)));
          for(let s2=0;s2<=steps;s2++){
            const x=h.px+(h.x-h.px)*s2/steps, y=h.py+(h.y-h.py)*s2/steps;
            G.bg.beginPath(); G.bg.arc(x,y,R,0,Math.PI*2); G.bg.fill();
            G.cells.forEach(cell=>{
              if(!cell.clean&&Math.hypot(cell.x-x,cell.y-y)<R){ cell.clean=true; G.cleanN++; }
            });
          }
        });
        G.bg.restore();
      }
      // 칠판 틴트 + 남은 낙서 + 지우개 표시
      ctx.fillStyle='rgba(16,64,43,.42)'; ctx.fillRect(0,0,map.W,map.H);
      ctx.drawImage(G.bc,0,0);
      hands.forEach(h=>{
        ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(-0.35);
        ctx.shadowBlur=12; ctx.shadowColor='rgba(255,255,255,.5)';
        ctx.fillStyle='#d9c9a3'; rrCtx(-R*0.55,-R*0.32,R*1.1,R*0.64,10); ctx.fill();
        ctx.fillStyle='#5a4632'; rrCtx(-R*0.55,-R*0.32,R*1.1,R*0.2,8); ctx.fill();
        ctx.restore();
      });
      const pct=G.total?Math.round(G.cleanN/G.total*100):0;
      $('repNum').textContent=pct;
      if(pct>=97){
        if(G.round>=ROUNDS){ beep(880,0.2); buzz([0,60,50,60]); this.finish(false); return; }
        G.round++;
        beep(760,0.14); buzz([0,50,40,50]);
        setState('클리어! '+G.round+'번째 칠판 등장!','#a3e635');
        this._newBoard();
        G.betweenUntil=now+1200;
        return;
      }
      setState('R'+G.round+'/'+ROUNDS+' — '+(pct<5?'낙서를 손으로 문질러 지워요!':(pct<60?'싹싹 문질러요! '+pct+'%':'거의 다 됐어요! 구석구석!')),'#4ade80');
    }
  };
})();

/* ---------- 도마 칼질 (60초 채썰기) ---------- */
ACT.chop=(()=>{
  const G={};
  const DUR=60;
  const VEGS=[
    {name:'오이',body:'#4d9e3f',skin:'#2f7327',flesh:'#d7f0c0'},
    {name:'당근',body:'#f2842b',skin:'#d96a12',flesh:'#ffd9ad'},
    {name:'무',  body:'#eef3e6',skin:'#a8cf8e',flesh:'#ffffff'}
  ];
  const SLICES=10;
  function newVeg(){
    const v=VEGS[G.vegN%VEGS.length]; G.vegN++;
    G.veg={name:v.name,body:v.body,skin:v.skin,flesh:v.flesh,left:SLICES};
  }
  return {
    key:'chop', hud:{counter:true,timer:true,end:true}, _G:G,
    intro:{emoji:'🔪',title:'도마 칼질',desc:'도마 위 채소를 <b>손날로 위에서 아래로 탁탁탁!</b><br>내리칠 때마다 한 조각씩 채썰어져요. 다 썰면 다음 채소!<br>60초 동안 몇 조각이나 썰까요?'},
    start(){ G.n=0; G.vegN=0; G.endAt=performance.now()+DUR*1000; G.pt=0;
      G.pieces=[]; G.lastChop=0; G.flash=null; newVeg();
      $('repNum').textContent='0'; $('repLbl').textContent='SLICES'; $('timerUnit').textContent='SEC'; },
    end(){ this.finish(); },
    finish(){
      const prev=+(best.get('chop')||0); if(G.n>prev) best.set('chop',G.n);
      showResult({num:G.n,sub:'조각 썰었어요! 🔪'+(G.n>prev&&G.n>0?' 🏆 기록 경신!':''),
        detail:G.n>=40?'주방장 등극! 👨‍🍳':G.n>=25?'채썰기 달인!':'손날을 위에서 아래로 빠르게!'});
    },
    frame(lms){
      const now=performance.now();
      const remain=Math.max(0,(G.endAt-now)/1000);
      $('timerVal').textContent=Math.ceil(remain);
      if(remain<=0){ this.finish(); return; }
      const dt=Math.min(50,now-(G.pt||now)); G.pt=now;
      let hands=[];
      if(lms){ drawPose(lms,'#f59e0b'); hands=hands2(lms); drawHandGlow(hands,'#f59e0b'); }
      else setState('몸이 보이게 서 주세요','#fbbf24');
      // 도마
      const bw=Math.min(map.W*0.8,460), bh=Math.max(46,bw*0.14);
      const bx=map.W/2, by=map.H*0.72;
      ctx.save();
      ctx.fillStyle='#9a6b3f'; rrCtx(bx-bw/2,by,bw,bh,14); ctx.fill();
      ctx.fillStyle='#7c5430'; rrCtx(bx-bw/2,by+bh-10,bw,10,6); ctx.fill();
      // 남은 채소
      const v=G.veg;
      const fullL=bw*0.8, vh=Math.max(30,bh*0.72);
      const remL=fullL*(v.left/SLICES);
      const vx0=bx-fullL/2, vy0=by-vh+6;
      if(v.left>0){
        ctx.fillStyle=v.skin; rrCtx(vx0,vy0,remL,vh,vh/2); ctx.fill();
        ctx.fillStyle=v.body; rrCtx(vx0+3,vy0+3,Math.max(6,remL-6),vh-6,(vh-6)/2); ctx.fill();
        ctx.fillStyle=v.flesh;                                   // 썰린 단면
        ctx.beginPath(); ctx.ellipse(vx0+remL-2,vy0+vh/2,7,vh/2-3,0,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
      // 판정: 남은 채소 위로 빠르게 내리치는 손날
      if(v.left>0&&hands.length&&now-G.lastChop>190){
        const hit=hands.find(h=>h.vy>550&&segHit(h,Math.max(vx0+16,Math.min(vx0+remL-8,h.x)),vy0+vh/2,vh+30));
        if(hit){
          G.lastChop=now; G.n++; v.left--;
          const px2=vx0+fullL*(v.left/SLICES)+fullL/SLICES/2;
          G.pieces.push({x:px2,y:vy0+vh/2,vx:70+Math.random()*130,vy:-(260+Math.random()*170),
            rot:0,vr:3+Math.random()*4,w:fullL/SLICES*0.72,h:vh*0.9,col:v.flesh,edge:v.skin,t:now});
          if(G.pieces.length>24) G.pieces.shift();
          G.flash={x:px2,t:now,y0:vy0-34,y1:vy0+vh+14};
          const n=$('repNum'); n.textContent=G.n;
          n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
          beep(190+Math.random()*60,0.05,0.32); buzz(20);
          if(v.left<=0){ setState(v.name+' 완료! 다음 채소! 🎉','#a3e635'); beep(880,0.14); newVeg(); }
          else setState(['탁!','탁탁!','샥!'][G.n%3],'#f59e0b');
        }
      }
      // 썰린 조각 파티클
      G.pieces=G.pieces.filter(p=>{
        const age=now-p.t; if(age>900) return false;
        p.vy+=map.H*1.3*dt/1000; p.x+=p.vx*dt/1000; p.y+=p.vy*dt/1000; p.rot+=p.vr*dt/1000;
        ctx.save(); ctx.globalAlpha=Math.min(1,2-age/450); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle=p.edge; rrCtx(-p.w/2,-p.h/2,p.w,p.h,6); ctx.fill();
        ctx.fillStyle=p.col; rrCtx(-p.w/2+2,-p.h/2+2,p.w-4,p.h-4,4); ctx.fill();
        ctx.restore();
        return true;
      });
      // 칼질 플래시
      if(G.flash&&now-G.flash.t<160){
        const al=1-(now-G.flash.t)/160;
        ctx.strokeStyle='rgba(255,255,255,'+al.toFixed(3)+')'; ctx.lineWidth=4;
        ctx.shadowBlur=14; ctx.shadowColor='#fff';
        ctx.beginPath(); ctx.moveTo(G.flash.x,G.flash.y0); ctx.lineTo(G.flash.x,G.flash.y1); ctx.stroke();
        ctx.shadowBlur=0;
      }
    }
  };
})();

/* ---------- 자세 분석 ---------- */
ACT.posture=(()=>{
  const G={};
  const HOLD=4.0;                          // 정지 스캔 시간(초)
  const D=180/Math.PI;
  const IDX=[0,7,8,11,12,23,24,25,26,27,28];
  function vpx(l){ return {x:l.x*map.vw, y:l.y*map.vh}; }   // 비디오 픽셀(각도 계산용)
  function lineDeg(a,b){ // 수평 기준 기울기(도)
    const A=vpx(a),B=vpx(b);
    return Math.atan2(B.y-A.y,B.x-A.x)*D;
  }
  function tiltDeg(a,b){ // 수평선 대비 기울기 크기(0~90°) — 점 순서·좌우 방향 무관
    const d=Math.abs(lineDeg(a,b))%180;
    return Math.min(d,180-d);
  }
  function fromVertDeg(top,botm){ // 수직 기준 기울기
    const T=vpx(top),B=vpx(botm);
    return Math.atan2(Math.abs(T.x-B.x),Math.max(1e-6,Math.abs(B.y-T.y)))*D;
  }
  function avgFrames(buf){
    const out={};
    IDX.forEach(i=>{
      let x=0,y=0,z=0,v=0;
      buf.forEach(f=>{ x+=f[i].x; y+=f[i].y; z+=(f[i].z||0); v+=visOf(f[i]); });
      out[i]={x:x/buf.length,y:y/buf.length,z:z/buf.length,visibility:v/buf.length};
    });
    return out;
  }
  function stanceOf(lms){ // front / side / unknown
    const shW=Math.abs(lms[11].x-lms[12].x)*map.vw;
    const torso=Math.abs((lms[11].y+lms[12].y)/2-(lms[23].y+lms[24].y)/2)*map.vh;
    if(torso<1) return 'unknown';
    const ratio=shW/torso;
    if(ratio>0.55) return 'front';
    if(ratio<0.32) return 'side';
    return 'unknown';
  }
  function grade3(v,warn,bad){ return v<warn?0:(v<bad?1:2); }
  const GTXT=['양호','주의','관리 필요'];

  function computeFront(a){
    const m=[];
    const head=tiltDeg(a[7],a[8]);
    const headHi=(a[7].y<a[8].y)?'왼':'오른';
    m.push({ic:'🙂',nm:'머리 기울기',val:head,unit:'°',g:grade3(head,3,6),max:10,
      d:head<3?'머리가 수평으로 잘 서 있어요.':'머리가 '+headHi+'쪽으로 '+head.toFixed(1)+'° 기울어져 있어요. 화면을 볼 때 머리를 세우는 습관을 들여요.',rx:['neckSide']});
    const midS={x:(a[11].x+a[12].x)/2,y:(a[11].y+a[12].y)/2};
    const hshift=fromVertDeg(a[0],midS);
    m.push({ic:'👤',nm:'머리 치우침',val:hshift,unit:'°',g:grade3(hshift,4,8),max:14,
      d:hshift<4?'머리가 몸 중심 바로 위에 잘 놓여 있어요.':'머리가 몸 중심에서 옆으로 '+hshift.toFixed(1)+'° 치우쳐 있어요. 정수리를 위로 늘리는 느낌으로 목을 세워요.',rx:['chinTuck','neckSide']});
    const sh=tiltDeg(a[11],a[12]);
    const shHi=(a[11].y<a[12].y)?'왼':'오른';
    m.push({ic:'🫲',nm:'어깨 수평',val:sh,unit:'°',g:grade3(sh,2.5,5),max:10,
      d:sh<2.5?'양쪽 어깨 높이가 비슷해요.':shHi+'쪽 어깨가 '+sh.toFixed(1)+'° 높아요. 가방을 한쪽으로만 메지 않는지 확인해요.',rx:['wallAngel','neckSide']});
    const pv=tiltDeg(a[23],a[24]);
    const pvHi=(a[23].y<a[24].y)?'왼':'오른';
    m.push({ic:'🩳',nm:'골반 수평',val:pv,unit:'°',g:grade3(pv,2.5,5),max:10,
      d:pv<2.5?'골반이 수평으로 균형 잡혀 있어요.':pvHi+'쪽 골반이 '+pv.toFixed(1)+'° 높아요. 다리를 꼬는 습관이 있는지 돌아봐요.',rx:['sidePlank','squatApp']});
    const midSh={x:(a[11].x+a[12].x)/2,y:(a[11].y+a[12].y)/2};
    const midAn={x:(a[27].x+a[28].x)/2,y:(a[27].y+a[28].y)/2};
    const lean=fromVertDeg(midSh,midAn);
    m.push({ic:'🧍',nm:'몸 중심선',val:lean,unit:'°',g:grade3(lean,2,4),max:8,
      d:lean<2?'몸의 중심이 반듯하게 서 있어요.':'몸이 한쪽으로 '+lean.toFixed(1)+'° 기울어 서 있어요. 양발에 체중을 고르게 실어요.',rx:['balance','sidePlank']});
    // 무릎 모양 힌트(참고): 발목 대비 무릎 사이 간격
    const kg=Math.abs(a[25].x-a[26].x), ag=Math.abs(a[27].x-a[28].x);
    if(ag*map.vw>8&&visOf(a[27])>0.3&&visOf(a[28])>0.3){
      const ratio=kg/Math.max(ag,1e-6);
      const g=(ratio<0.6||ratio>1.7)?1:0;
      m.push({ic:'🦵',nm:'무릎 정렬 (참고)',val:ratio,unit:'',fmt:v=>v.toFixed(2),g,max:2,
        d:g===0?'무릎과 발목의 정렬이 자연스러워요.':(ratio<0.6?'무릎 사이가 발목보다 많이 좁아요(X자 힌트). 스쿼트로 다리 안쪽·바깥 근육을 고르게 길러요.':'무릎 사이가 발목보다 많이 넓어요(O자 힌트). 정확한 자세의 스쿼트가 도움이 돼요.'),rx:['squatApp']});
    }
    // 다리 정렬 대칭(참고): 화면상 엉덩이~발목 길이의 좌우 차이
    const lenL=Math.hypot((a[23].x-a[27].x)*map.vw,(a[23].y-a[27].y)*map.vh);
    const lenR=Math.hypot((a[24].x-a[28].x)*map.vw,(a[24].y-a[28].y)*map.vh);
    if(lenL>30&&lenR>30){
      const diff=Math.abs(lenL-lenR)/((lenL+lenR)/2)*100;
      m.push({ic:'📐',nm:'다리 정렬 대칭 (참고)',val:diff,unit:'%',fmt:v=>v.toFixed(1),g:grade3(diff,2.5,5),max:8,
        d:diff<2.5?'양쪽 다리 정렬이 대칭에 가까워요.':'화면상 양쪽 다리 길이가 '+diff.toFixed(1)+'% 달라 보여요. 골반 기울기나 서 있는 각도의 영향일 수 있어요.',rx:['sidePlank','balance']});
    }
    return m;
  }
  function computeSide(a){
    const m=[];

    const L=visOf(a[7])+visOf(a[11])+visOf(a[23])>=visOf(a[8])+visOf(a[12])+visOf(a[24]);

  function frontFacingCheck(a){

    try{
      const cv=await buildImage();
      const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
      if(!blob) throw new Error('canvas toBlob returned null');
      const name='자세분석리포트_'+new Date().toISOString().slice(0,10)+'.png';
      const file=new File([blob],name,{type:'image/png'});
      const url=URL.createObjectURL(blob);

      const shareOk=!!(navigator.canShare&&navigator.canShare({files:[file]})&&navigator.share);
      $('imShare').style.display=shareOk?'':'none';
      $('imShare').onclick=async()=>{
        try{ await navigator.share({files:[file],title:'AI 자세 분석 리포트'}); }
        catch(e){ if(!(e&&e.name==='AbortError')) toast('공유에 실패했어요. 이미지를 길게 눌러 저장해 보세요.'); }

  // 기기 수평계(버블 레벨): 센서 있으면 표시하고 수평 여부 반환 (true/false), 센서 없으면 null

  // 스캔 연출: 바디 브래킷 + 왕복 스캔라인 + 실시간 각도 리드아웃 + 진행바
  function drawScan(lms,pct,label){
    const ids=[0,7,8,11,12,15,16,23,24,25,26,27,28].filter(i=>lms[i]&&visOf(lms[i])>0.3);
    if(ids.length<4) return;
    let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
    ids.forEach(i=>{ const p=toPx(lms[i]); if(p.x<x0)x0=p.x; if(p.y<y0)y0=p.y; if(p.x>x1)x1=p.x; if(p.y>y1)y1=p.y; });
    const pad=34; x0-=pad; y0-=pad*1.5; x1+=pad; y1+=pad;
    const now=performance.now();
    ctx.save();
    // 코너 브래킷
    ctx.strokeStyle='rgba(45,212,191,.95)'; ctx.lineWidth=3; ctx.shadowBlur=10; ctx.shadowColor='#2dd4bf';
    const L=26;
    [[x0,y0,1,1],[x1,y0,-1,1],[x0,y1,1,-1],[x1,y1,-1,-1]].forEach(b=>{
      ctx.beginPath(); ctx.moveTo(b[0]+b[2]*L,b[1]); ctx.lineTo(b[0],b[1]); ctx.lineTo(b[0],b[1]+b[3]*L); ctx.stroke();

    gr.addColorStop(0,'rgba(45,212,191,0)'); gr.addColorStop(0.5,'rgba(45,212,191,.95)'); gr.addColorStop(1,'rgba(45,212,191,0)');
    ctx.strokeStyle=gr; ctx.lineWidth=3; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.moveTo(x0,yy); ctx.lineTo(x1,yy); ctx.stroke();
    ctx.shadowBlur=0;
    // 진행바(박스 하단)
    ctx.fillStyle='rgba(148,163,184,.25)'; ctx.fillRect(x0,y1+14,x1-x0,6);
    ctx.fillStyle='#2dd4bf'; ctx.fillRect(x0,y1+14,(x1-x0)*pct/100,6);
    // 라벨 + 실시간 수치 리드아웃

    ctx.fillText('TRACK '+ids.length+' PTS',rx0,ry0+52);

  return {
