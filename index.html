      const ready=sum/core.length>=0.5 && visOf(lms[27])+visOf(lms[28])>0.5;
      drawPose(lms, G.step==='front'?'#2dd4bf':'#a78bfa');
      if(!ready){ G.buf=[]; G.stableAt=null; setState('발끝까지 전신이 보이게 뒤로 물러나요','#fbbf24'); $('timerVal').textContent='0%'; return; }
      const stance=stanceOf(lms);
      const want=G.step;
      if(stance!==want){
        G.buf=[]; G.stableAt=null; $('timerVal').textContent='0%';
        setState(want==='front'?'카메라를 정면으로 바라보고 바르게 서요':'옆으로 돌아 옆모습이 보이게 서요 (한쪽 어깨가 카메라 쪽)', '#22d3ee');
        return;
      }
      // 기기 수평 게이트: 폰이 기울면 어깨/골반 수평 측정이 왜곡되므로 스캔 정지
      const lv=drawLevel();
      if(lv===false){
        G.stableAt=null; G.buf=[];
        setState('📐 폰을 수평으로 세워 주세요 — 수평계를 초록불로!','#fbbf24');
        $('timerVal').textContent='0%';
        return;
      }
      if(lv===true){ const tn=tiltNow(); G.rolls.push(Math.abs(tn.roll)); if(G.rolls.length>400) G.rolls.shift(); }
      // 안정(정지) 감지: 골반 중점 이동량 (신뢰도 계산에도 사용)
      const mid={x:(lms[23].x+lms[24].x)/2, y:(lms[23].y+lms[24].y)/2};
      if(G.lastMid){
        const mv=Math.hypot(mid.x-G.lastMid.x,(mid.y-G.lastMid.y))*map.vh;
        if(mv>7){ G.stableAt=null; G.buf=[]; }
        G.mvs.push(mv); if(G.mvs.length>300) G.mvs.shift();
      }
      G.lastMid=mid;
      if(!G.stableAt) G.stableAt=now;
      G.buf.push(IDX.reduce((o,i)=>(o[i]={x:lms[i].x,y:lms[i].y,z:(lms[i].z||0),visibility:visOf(lms[i])},o),{}));
      if(G.buf.length>140) G.buf.shift();
      const held=(now-G.stableAt)/1000;
      const pct=Math.min(100,Math.round(held/HOLD*100));
      $('timerVal').textContent=pct+'%';
      drawScan(lms,pct,want==='front'?'FRONT SCAN':'SIDE SCAN');
      setState(want==='front'?'그대로 가만히… 정면 정밀 스캔 중':'그대로 가만히… 측면 정밀 스캔 중', '#a3e635');
      if(held>=HOLD&&G.buf.length>=20){
        const a=avgFrames(G.buf.slice(-60));
        if(want==='front'){
          G.frontM=computeFront(a); G.snapF=snapshot(a,'front'); G.frontA=a;
          G.step='frontProc'; G.procUntil=now+1700;
          beep(880,0.2); buzz([0,60,50,60]);
          setState('정면 스캔 완료! 데이터 분석 중…','#2dd4bf');
        }else{
          G.sideM=computeSide(a); G.snapS=snapshot(a,'side'); G.sideA=a;
          const avgMv=G.mvs.length?G.mvs.reduce((x,y)=>x+y,0)/G.mvs.length:0;
          G.rel=Math.max(86,Math.min(99,Math.round(99-avgMv*2.2)));
          G.step='sideProc'; G.procUntil=now+2300;
          beep(1040,0.25); buzz([0,80,50,80]);
          setState('측면 스캔 완료! AI가 지표를 종합하는 중…','#2dd4bf');
        }
      }
    }
  };
})();

/* ============================================================
   실행 흐름
   ============================================================ */
let curKey=null;
function openIntro(key){
  curKey=key;
  const a=ACT[key];
  hideAll(); running=false; setHud(false);
  $('introEmoji').textContent=a.intro.emoji;
  $('introTitle').textContent=a.intro.title;
  $('introDesc').innerHTML=a.intro.desc;
  $('introBest').textContent=bestLabel(key);
  $('loadMsg').textContent='';
  $('introStart').disabled=false; $('introStart').textContent='시작하기';
  show('introScr');
}
async function startActivity(){
  const a=ACT[curKey];
  const btn=$('introStart');
  btn.disabled=true; btn.textContent='준비 중…';
  initAudio();
  if(curKey==='posture') initTilt();   // iOS 센서 권한은 사용자 제스처 내에서 요청
  try{
    await loadModels();
    $('loadMsg').textContent='카메라를 켜는 중…';
    await startCam();
  }catch(e){
    btn.disabled=false; btn.textContent='시작하기';
    $('loadMsg').textContent='카메라를 켤 수 없어요. 브라우저의 카메라 권한을 허용해 주세요. ('+(e&&e.message||e)+')';
    return;
  }
  hideAll();
  $('hudName').textContent=a.intro.title;
  setHud(true,a.hud);
  keepAwake();
  handTrack={L:null,R:null};
  current=a; a.start();
  if(a.key!=='posture') await countdown(3);
  running=true; lastVideoTime=-1; loop();
}
function showResult(o){
  running=false; setHud(false); current=null;
  $('resNum').textContent=o.num;
  $('resSub').innerHTML=o.sub||'';
  $('resDetail').innerHTML=o.detail||'';
  show('resultScr');
  beep(880,0.3); buzz([0,80,50,80]);
  refreshBests();
}
function goHub(){
  running=false; current=null; setHud(false);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  refreshBests();
  show('hubScr');
}

/* ---------- 이벤트 ---------- */
document.querySelectorAll('.hcard[data-ex]').forEach(b=>b.addEventListener('click',()=>{ initAudio(); openIntro(b.dataset.ex); }));
const rlCard=$('reactionLabCard');
if(rlCard) rlCard.addEventListener('click',()=>{ location.href='./reaction-lab.html'; });
$('introBack').onclick=goHub;
$('introStart').onclick=startActivity;
$('menuBtn').onclick=()=>{ if(current&&current.key==='posture'){ goHub(); return; }
  if(current&&current.end&&['squat','jacks'].includes(current.key)&&current._S&&current._S.reps>0){ current.end(); }
  else goHub(); };
$('flipBtn').onclick=async()=>{
  facing=(facing==='user')?'environment':'user';
  if(DEBUG) return;
  stopCam(); lastVideoTime=-1;
  try{ await startCam(); }
  catch(e){ facing=(facing==='user')?'environment':'user'; try{ await startCam(); }catch(_){} }
};
$('viewBtn').onclick=()=>{
  viewPref=(viewPref==='contain')?'auto':'contain';
  try{ localStorage.setItem('mc_view',viewPref); }catch(e){}
  updateMap();
};
$('resetBtn').onclick=()=>{ if(current&&current.reset) current.reset(); };
$('endBtn').onclick=()=>{ if(current&&current.end) current.end(); };
$('againBtn').onclick=()=>{ openIntro(curKey); startActivity(); };
$('resMenuBtn').onclick=goHub;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ running=false; }
  else if(current&&(camOn||DEBUG)){ keepAwake(); running=true; lastVideoTime=-1; loop(); }
});

/* ---------- 딥링크: ?ex=squat 등이면 해당 인트로 바로 열기 ---------- */
refreshBests();
const deep=params.get('ex');
if(deep&&ACT[deep]) openIntro(deep);

/* ---------- DEBUG 훅 ---------- */
if(DEBUG){
  window.__app={openIntro,startActivity,goHub,ACT,map,get current(){return current;},get running(){return running;}};
}
</script>
